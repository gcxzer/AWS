<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="980" viewBox="0 0 1560 980" role="img" aria-labelledby="title desc">
  <title id="title">TopicFollow ECS service bootstrap flow</title>
  <desc id="desc">A diagram showing the AWS resources configured before creating the TopicFollow ECS service: ECR image, ECS task definition, IAM roles, S3 environment file, Secrets Manager, CloudWatch Logs, private subnets, ECS service security group, RDS security group, RDS PostgreSQL, and S3 uploads.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .vpc { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; }
      .subnet { fill: #ffffff; stroke: #60a5fa; stroke-width: 2; }
      .service { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.5; }
      .aws { fill: #fff7ed; stroke: #f97316; stroke-width: 2.5; }
      .iam { fill: #fefce8; stroke: #ca8a04; stroke-width: 2.5; }
      .data { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2.5; }
      .warn { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; }
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .h1 { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .h2 { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .txt { font: 15px Arial, sans-serif; fill: #334155; }
      .small { font: 13px Arial, sans-serif; fill: #475569; }
      .mono { font: 13px "SFMono-Regular", Consolas, monospace; fill: #1e293b; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .arrow2 { stroke: #0f766e; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead-teal); }
      .dash { stroke-dasharray: 8 7; }
      .badge { fill: #2563eb; }
      .badgeText { font: 700 14px Arial, sans-serif; fill: #ffffff; }
    </style>
    <marker id="arrowhead" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L11,4 L0,8 Z" fill="#334155"/>
    </marker>
    <marker id="arrowhead-teal" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L11,4 L0,8 Z" fill="#0f766e"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1560" height="980"/>
  <text class="title" x="50" y="58">TopicFollow ECS Service Bootstrap, before ALB</text>
  <text class="txt" x="50" y="86">Region eu-central-1, account 089781651608. Secret values are intentionally omitted.</text>

  <rect class="panel" x="50" y="120" width="420" height="265" rx="14"/>
  <text class="h1" x="78" y="158">Build and registry</text>
  <rect class="aws" x="78" y="185" width="360" height="82" rx="10"/>
  <text class="h2" x="102" y="216">Docker image</text>
  <text class="mono" x="102" y="244">topicfollow-prod:latest</text>
  <rect class="aws" x="78" y="285" width="360" height="74" rx="10"/>
  <text class="h2" x="102" y="316">ECR repository</text>
  <text class="mono" x="102" y="344">.../topicfollow-prod:latest</text>

  <rect class="panel" x="520" y="120" width="465" height="265" rx="14"/>
  <text class="h1" x="548" y="158">Task definition</text>
  <text class="mono" x="548" y="188">topicfollow-prod-web:1</text>
  <rect class="service" x="548" y="212" width="395" height="120" rx="10"/>
  <text class="h2" x="572" y="243">Container: topicfollow-web</text>
  <text class="small" x="572" y="270">Image from ECR, port 3000/tcp, HTTP</text>
  <text class="small" x="572" y="294">Fargate, awsvpc, 1 vCPU, 3 GB memory</text>
  <text class="small" x="572" y="318">CloudWatch logs: /topicfollow/prod/web</text>

  <rect class="panel" x="1035" y="120" width="475" height="265" rx="14"/>
  <text class="h1" x="1063" y="158">Runtime configuration</text>
  <rect class="data" x="1063" y="185" width="405" height="76" rx="10"/>
  <text class="h2" x="1087" y="216">S3 environment file</text>
  <text class="mono" x="1087" y="244">ecs-env/topicfollow-prod-web.env</text>
  <rect class="data" x="1063" y="281" width="405" height="76" rx="10"/>
  <text class="h2" x="1087" y="312">Secrets Manager</text>
  <text class="mono" x="1087" y="340">/topicfollow/prod/web</text>

  <rect class="vpc" x="50" y="430" width="1460" height="420" rx="18"/>
  <text class="h1" x="82" y="470">VPC topicfollow-prod-vpc, 10.20.0.0/16</text>

  <rect class="subnet" x="82" y="505" width="440" height="260" rx="12"/>
  <text class="h2" x="108" y="538">Private app subnets</text>
  <text class="mono" x="108" y="568">subnet-01e0153728068627f</text>
  <text class="small" x="108" y="590">private1, eu-central-1a, 10.20.128.0/20</text>
  <text class="mono" x="108" y="620">subnet-0023bb67b13179a12</text>
  <text class="small" x="108" y="642">private2, eu-central-1b, 10.20.144.0/20</text>
  <rect class="service" x="108" y="675" width="360" height="58" rx="10"/>
  <text class="h2" x="132" y="711">ECS Service: topicfollow-prod-web</text>

  <rect class="subnet" x="560" y="505" width="370" height="260" rx="12"/>
  <text class="h2" x="586" y="538">Security groups</text>
  <rect class="iam" x="586" y="565" width="305" height="70" rx="10"/>
  <text class="h2" x="610" y="595">ECS service SG</text>
  <text class="mono" x="610" y="620">sg-0ba3af6d70566127f</text>
  <rect class="iam" x="586" y="660" width="305" height="70" rx="10"/>
  <text class="h2" x="610" y="690">RDS SG</text>
  <text class="small" x="610" y="715">Allows PostgreSQL 5432 only from ECS SG</text>

  <rect class="subnet" x="970" y="505" width="490" height="260" rx="12"/>
  <text class="h2" x="996" y="538">Private database subnets</text>
  <text class="mono" x="996" y="568">subnet-096482bb9a355e2fb</text>
  <text class="small" x="996" y="590">private3, eu-central-1a, 10.20.160.0/20</text>
  <text class="mono" x="996" y="620">subnet-06b6393c114f8d676</text>
  <text class="small" x="996" y="642">private4, eu-central-1b, 10.20.176.0/20</text>
  <rect class="data" x="996" y="675" width="420" height="58" rx="10"/>
  <text class="h2" x="1020" y="711">RDS PostgreSQL: topicfollow-prod-postgres</text>

  <rect class="panel" x="50" y="880" width="1460" height="70" rx="14"/>
  <text class="h2" x="78" y="910">Current service creation choices</text>
  <text class="txt" x="78" y="936">Use only the two private app subnets, attach topicfollow-prod-ecs-service-sg, disable public IP, and skip Service Connect, service discovery, load balancer, and VPC Lattice for the first boot.</text>

  <rect class="iam" x="520" y="800" width="465" height="50" rx="10"/>
  <text class="h2" x="548" y="831">IAM execution role: ecsTaskExecutionRole</text>
  <rect class="iam" x="1035" y="800" width="475" height="50" rx="10"/>
  <text class="h2" x="1063" y="831">IAM task role: topicfollow-prod-web-task-role</text>

  <path class="arrow" d="M438 326 C485 326 495 262 548 262"/>
  <path class="arrow" d="M943 262 C990 262 1010 223 1063 223"/>
  <path class="arrow" d="M943 287 C994 287 1010 318 1063 318"/>
  <path class="arrow2" d="M750 332 C750 430 288 430 288 675"/>
  <path class="arrow2" d="M468 704 C510 704 540 600 586 600"/>
  <path class="arrow2" d="M891 695 C940 695 953 704 996 704"/>
  <path class="arrow2 dash" d="M752 800 C752 710 468 740 468 704"/>
  <path class="arrow2 dash" d="M1272 800 C1268 710 1416 754 1416 704"/>
  <path class="arrow dash" d="M1268 357 C1268 430 300 430 300 675"/>
  <path class="arrow dash" d="M1268 261 C1268 410 742 410 742 800"/>

  <circle class="badge" cx="74" cy="130" r="16"/>
  <text class="badgeText" x="69" y="135">1</text>
  <circle class="badge" cx="544" cy="130" r="16"/>
  <text class="badgeText" x="539" y="135">2</text>
  <circle class="badge" cx="1059" cy="130" r="16"/>
  <text class="badgeText" x="1054" y="135">3</text>
  <circle class="badge" cx="106" cy="517" r="16"/>
  <text class="badgeText" x="101" y="522">4</text>

  <rect class="warn" x="82" y="785" width="390" height="46" rx="8"/>
  <text class="small" x="108" y="814">No public IP on tasks; public traffic comes later through ALB.</text>
</svg>
