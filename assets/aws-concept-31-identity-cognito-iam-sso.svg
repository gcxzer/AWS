<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Cognito IAM IAM Identity Center comparison</title>
  <desc id="desc">A Chinese diagram comparing Cognito, IAM, and IAM Identity Center.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .page { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475467; }
      .box { fill: #ffffff; stroke: #d0d5dd; stroke-width: 2; rx: 14; }
      .user { fill: #eef4ff; stroke: #175cd3; stroke-width: 2.5; rx: 16; }
      .service { fill: #fff7ed; stroke: #f97316; stroke-width: 2.5; rx: 16; }
      .aws { fill: #ecfdf3; stroke: #039855; stroke-width: 2.5; rx: 16; }
      .warn { fill: #fdf2fa; stroke: #c11574; stroke-width: 2.4; rx: 14; }
      .label { font: 700 21px Arial, sans-serif; fill: #101828; }
      .body { font: 400 15.5px Arial, sans-serif; fill: #475467; }
      .tiny { font: 400 13.5px Arial, sans-serif; fill: #667085; }
      .line { stroke: #344054; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #667085; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.8; rx: 12; }
      .noteText { font: 700 16px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>
  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 29：Cognito、IAM、IAM Identity Center 区别</text>
  <text class="subtitle" x="52" y="92">最容易混的是“你的 App 用户登录”和“员工登录 AWS 控制台”不是一件事。</text>

  <rect class="user" x="70" y="150" width="240" height="100"/>
  <text class="label" x="104" y="190">App 用户</text>
  <text class="tiny" x="104" y="216">你的产品用户</text>
  <text class="tiny" x="104" y="236">邮箱、手机号、社交登录</text>

  <rect class="service" x="420" y="150" width="270" height="100"/>
  <text class="label" x="454" y="190">Amazon Cognito</text>
  <text class="tiny" x="454" y="216">注册、登录、JWT token</text>
  <text class="tiny" x="454" y="236">给 Web/Mobile App 用</text>
  <path class="line" d="M310 200 L420 200"/>

  <rect class="aws" x="812" y="150" width="330" height="100"/>
  <text class="label" x="846" y="190">你的应用后端</text>
  <text class="tiny" x="846" y="216">API Gateway / ALB / AppSync</text>
  <text class="tiny" x="846" y="236">校验 token 后处理业务</text>
  <path class="line" d="M690 200 L812 200"/>

  <rect class="user" x="70" y="330" width="240" height="100"/>
  <text class="label" x="104" y="370">员工 / 开发者</text>
  <text class="tiny" x="104" y="396">公司内部人员</text>
  <text class="tiny" x="104" y="416">进入 AWS 账号工作</text>

  <rect class="service" x="420" y="330" width="270" height="100"/>
  <text class="label" x="454" y="370">IAM Identity Center</text>
  <text class="tiny" x="454" y="396">SSO、用户组、permission set</text>
  <text class="tiny" x="454" y="416">给员工进 AWS 账号用</text>
  <path class="line" d="M310 380 L420 380"/>

  <rect class="aws" x="812" y="330" width="330" height="100"/>
  <text class="label" x="846" y="370">AWS Account</text>
  <text class="tiny" x="846" y="396">Console / CLI / Role</text>
  <text class="tiny" x="846" y="416">临时凭证操作 AWS 资源</text>
  <path class="line" d="M690 380 L812 380"/>

  <rect class="service" x="420" y="516" width="270" height="94"/>
  <text class="label" x="454" y="554">IAM</text>
  <text class="tiny" x="454" y="580">Role / Policy / STS</text>
  <text class="tiny" x="454" y="600">AWS 资源权限底座</text>

  <rect class="aws" x="812" y="516" width="330" height="94"/>
  <text class="label" x="846" y="554">AWS Resources</text>
  <text class="tiny" x="846" y="580">S3 / RDS / Lambda / ECS</text>
  <text class="tiny" x="846" y="600">由 IAM 判断能不能访问</text>
  <path class="line" d="M690 564 L812 564"/>
  <path class="dash" d="M555 430 L555 516"/>
  <path class="dash" d="M555 250 L555 516"/>

  <rect class="warn" x="70" y="520" width="240" height="86"/>
  <text class="label" x="104" y="558">一句区别</text>
  <text class="tiny" x="104" y="584">Cognito 管 App 用户</text>
  <text class="tiny" x="104" y="604">Identity Center 管员工进 AWS</text>

  <rect class="note" x="70" y="684" width="1072" height="44"/>
  <text class="noteText" x="102" y="712">一句话：Cognito 是你产品里的用户系统；IAM Identity Center 是员工进 AWS 的 SSO；IAM 是所有 AWS 权限判断的底座。</text>
</svg>
