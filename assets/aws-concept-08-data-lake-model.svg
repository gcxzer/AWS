<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">AWS data lake basic model</title>
  <desc id="desc">A diagram explaining S3 raw and curated zones, Glue Crawler and Data Catalog, Athena SQL queries, QuickSight dashboards, Glue ETL, and Redshift.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .page { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475467; }
      .box { fill: #ffffff; stroke: #d0d5dd; stroke-width: 2.2; rx: 14; }
      .s3 { fill: #ecfdf3; stroke: #039855; }
      .glue { fill: #fff7ed; stroke: #f97316; }
      .query { fill: #eef4ff; stroke: #175cd3; }
      .bi { fill: #fdf2fa; stroke: #c11574; }
      .warehouse { fill: #f4f3ff; stroke: #7a5af8; }
      .label { font: 700 21px Arial, sans-serif; fill: #101828; }
      .body { font: 400 15.5px Arial, sans-serif; fill: #475467; }
      .tiny { font: 400 13.5px Arial, sans-serif; fill: #667085; }
      .line { stroke: #344054; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #667085; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.8; rx: 12; }
      .noteText { font: 700 16px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>
  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 8：数据湖最小心智模型</text>
  <text class="subtitle" x="52" y="92">S3 存原始数据，Glue 让数据变成“有表结构可查询”，Athena 用 SQL 查，QuickSight 做图表。</text>

  <rect class="box" x="54" y="238" width="188" height="106"/>
  <text class="label" x="84" y="278">Data Sources</text>
  <text class="tiny" x="84" y="306">App logs / CSV / JSON</text>
  <text class="tiny" x="84" y="328">DB export / events</text>

  <rect class="box s3" x="308" y="212" width="210" height="158"/>
  <text class="label" x="340" y="252">S3 Raw Zone</text>
  <text class="body" x="340" y="282">原始数据</text>
  <text class="tiny" x="340" y="312">先完整保存</text>
  <text class="tiny" x="340" y="336">不要急着覆盖</text>
  <path class="line" d="M242 292 L308 292"/>

  <rect class="box glue" x="586" y="158" width="220" height="120"/>
  <text class="label" x="618" y="198">Glue Crawler</text>
  <text class="body" x="618" y="228">扫描文件</text>
  <text class="tiny" x="618" y="252">推断 schema</text>
  <path class="line" d="M518 252 C548 232 558 220 586 214"/>

  <rect class="box glue" x="586" y="332" width="220" height="120"/>
  <text class="label" x="618" y="372">Glue Catalog</text>
  <text class="body" x="618" y="402">表结构目录</text>
  <text class="tiny" x="618" y="426">database / table / column</text>
  <path class="line" d="M696 278 L696 332"/>

  <rect class="box query" x="882" y="244" width="220" height="120"/>
  <text class="label" x="914" y="284">Athena</text>
  <text class="body" x="914" y="314">用 SQL 查 S3</text>
  <text class="tiny" x="914" y="338">serverless query</text>
  <path class="line" d="M806 392 C844 368 858 340 882 310"/>

  <rect class="box bi" x="882" y="470" width="220" height="104"/>
  <text class="label" x="914" y="510">QuickSight</text>
  <text class="body" x="914" y="540">Dashboard</text>
  <text class="tiny" x="914" y="562">给人看指标</text>
  <path class="line" d="M992 364 L992 470"/>

  <rect class="box glue" x="308" y="482" width="210" height="106"/>
  <text class="label" x="340" y="522">Glue ETL</text>
  <text class="tiny" x="340" y="550">清洗、转换、分区</text>
  <path class="dash" d="M412 370 L412 482"/>

  <rect class="box s3" x="586" y="518" width="220" height="92"/>
  <text class="label" x="618" y="558">S3 Curated</text>
  <text class="tiny" x="618" y="586">Parquet / partitioned</text>
  <path class="line" d="M518 536 L586 562"/>

  <rect class="box warehouse" x="54" y="492" width="188" height="86"/>
  <text class="label" x="84" y="530">Redshift</text>
  <text class="tiny" x="84" y="556">长期数仓/高性能 BI</text>
  <path class="dash" d="M586 564 C460 646 264 616 148 578"/>

  <rect class="note" x="54" y="690" width="1048" height="44"/>
  <text class="noteText" x="86" y="718">一句话：S3 是湖底，Glue Catalog 是地图，Athena 是查询器，QuickSight 是看板，Redshift 是正式数仓。</text>
</svg>
