<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">AWS 入口、计算和部署模型</title>
  <desc id="desc">展示请求入口、计算服务和容器部署链路的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/></marker>
    <style>
      .page{fill:#f8fafc}
      .title{font:700 36px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0f172a}
      .sub{font:400 18px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#475569}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}
      .entry{fill:#eff6ff;stroke:#2563eb;stroke-width:2.4;rx:18}
      .compute{fill:#fff7ed;stroke:#f97316;stroke-width:2.4;rx:18}
      .deploy{fill:#ecfdf5;stroke:#16a34a;stroke-width:2.4;rx:18}
      .data{fill:#fefce8;stroke:#ca8a04;stroke-width:2.2;rx:18}
      .h{font:700 23px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0f172a}
      .t{font:400 16px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#475569}
      .s{font:400 14px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#64748b}
      .mono{font:500 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
      .line{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#64748b;stroke-width:2.3;stroke-dasharray:7 8;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="page" width="1600" height="980"/>
  <text class="title" x="58" y="66">入口和计算：谁接请求，谁运行代码，谁负责长期维持</text>
  <text class="sub" x="58" y="102">ALB/API Gateway/CloudFront 是入口；EC2/ECS/Lambda 才是运行代码的地方；ECR 只是镜像仓库。</text>

  <text class="h" x="80" y="168">A. 请求进入 AWS</text>
  <rect class="entry" x="80" y="205" width="220" height="120"/>
  <text class="h" x="115" y="250">DNS / CDN</text>
  <text class="s" x="115" y="280">Route 53 / CloudFront</text>
  <text class="s" x="115" y="304">或 Cloudflare</text>

  <rect class="entry" x="390" y="205" width="260" height="120"/>
  <text class="h" x="425" y="250">HTTP 入口</text>
  <text class="s" x="425" y="280">ALB：容器/服务器 Web</text>
  <text class="s" x="425" y="304">API Gateway：API 门面</text>

  <rect class="compute" x="750" y="160" width="260" height="105"/>
  <text class="h" x="785" y="205">ECS / Fargate</text>
  <text class="s" x="785" y="235">运行容器，service 维持 task</text>
  <rect class="compute" x="750" y="295" width="260" height="105"/>
  <text class="h" x="785" y="340">EC2</text>
  <text class="s" x="785" y="370">虚拟机，自己管 OS 和部署</text>
  <rect class="compute" x="750" y="430" width="260" height="105"/>
  <text class="h" x="785" y="475">Lambda</text>
  <text class="s" x="785" y="505">事件触发的短任务函数</text>

  <rect class="data" x="1130" y="240" width="300" height="160"/>
  <text class="h" x="1165" y="286">下游数据</text>
  <text class="s" x="1165" y="320">RDS：关系数据库</text>
  <text class="s" x="1165" y="346">S3：文件和对象</text>
  <text class="s" x="1165" y="372">DynamoDB / SQS / EventBridge</text>

  <path class="line" d="M300 265 H390"/>
  <path class="line" d="M650 265 C690 232 710 218 750 212"/>
  <path class="line" d="M650 282 C700 320 710 340 750 350"/>
  <path class="line" d="M650 300 C700 398 710 455 750 482"/>
  <path class="line" d="M1010 318 H1130"/>

  <text class="h" x="80" y="625">B. 容器部署链路</text>
  <rect class="deploy" x="80" y="665" width="220" height="112"/>
  <text class="h" x="115" y="710">代码</text>
  <text class="s" x="115" y="740">GitHub / 本地 repo</text>

  <rect class="deploy" x="380" y="665" width="220" height="112"/>
  <text class="h" x="415" y="710">Docker image</text>
  <text class="s" x="415" y="740">build 出来的应用包</text>

  <rect class="deploy" x="680" y="665" width="220" height="112"/>
  <text class="h" x="715" y="710">ECR</text>
  <text class="s" x="715" y="740">镜像仓库，只负责保存</text>

  <rect class="deploy" x="980" y="665" width="220" height="112"/>
  <text class="h" x="1015" y="710">Task Definition</text>
  <text class="s" x="1015" y="740">镜像、端口、CPU、env、role</text>

  <rect class="deploy" x="1280" y="665" width="220" height="112"/>
  <text class="h" x="1315" y="710">ECS Service</text>
  <text class="s" x="1315" y="740">滚动替换并维持 task 数</text>

  <path class="line" d="M300 721 H380"/>
  <path class="line" d="M600 721 H680"/>
  <path class="line" d="M900 721 H980"/>
  <path class="line" d="M1200 721 H1280"/>

  <rect class="box" x="80" y="850" width="1420" height="64"/>
  <text class="t" x="115" y="888">常见误区：ECR 不运行应用，Task Definition 不是容器实例，Service 不是镜像；真正跑起来的是 ECS Task。</text>
</svg>
