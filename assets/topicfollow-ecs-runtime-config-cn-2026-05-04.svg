<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">TopicFollow ECS 启动时拿什么配置</title>
  <desc id="desc">展示 ECS task 启动时从 ECR 拉镜像，从 S3 env file 读取非敏感环境变量，从 Secrets Manager 读取敏感变量，并使用 task role 访问 S3 uploads。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto"><path d="M0,0 L12,4.5 L0,9 Z" fill="#334155"/></marker>
    <style>
      .bg{fill:#f8fafc}.core{fill:#ecfeff;stroke:#0891b2;stroke-width:3}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2.5}
      .aws{fill:#fff7ed;stroke:#f97316;stroke-width:3}.secret{fill:#fef2f2;stroke:#dc2626;stroke-width:3}
      .data{fill:#f0fdf4;stroke:#16a34a;stroke-width:3}.iam{fill:#fefce8;stroke:#ca8a04;stroke-width:3}
      .title{font:700 34px Arial,sans-serif;fill:#0f172a}.h{font:700 22px Arial,sans-serif;fill:#0f172a}
      .t{font:17px Arial,sans-serif;fill:#334155}.s{font:15px Arial,sans-serif;fill:#475569}.m{font:14px Consolas,monospace;fill:#1e293b}
      .arrow{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:8 7}
    </style>
  </defs>
  <rect class="bg" width="1400" height="860"/>
  <text class="title" x="48" y="58">图 3：ECS task 启动时到底从哪里拿东西</text>
  <text class="t" x="48" y="90">镜像、普通配置、敏感配置、运行权限，是四件不同的事。</text>

  <rect class="core" x="475" y="285" width="450" height="215" rx="20"/>
  <text class="h" x="535" y="335">ECS Task / Container</text>
  <text class="m" x="535" y="365">topicfollow-prod-web:2</text>
  <text class="s" x="535" y="398">运行 Next.js: topicfollow-web</text>
  <text class="s" x="535" y="426">端口 3000</text>
  <text class="s" x="535" y="454">ARM64, Fargate</text>

  <rect class="aws" x="70" y="150" width="320" height="135" rx="16"/>
  <text class="h" x="105" y="195">ECR 镜像仓库</text>
  <text class="m" x="105" y="225">topicfollow-prod:latest</text>
  <text class="s" x="105" y="255">里面是打包好的应用代码</text>

  <rect class="data" x="70" y="400" width="320" height="165" rx="16"/>
  <text class="h" x="105" y="445">S3 env file</text>
  <text class="m" x="105" y="475">ecs-env/topicfollow-prod-web.env</text>
  <text class="s" x="105" y="508">只放非敏感变量：</text>
  <text class="m" x="130" y="536">NODE_ENV, APP_URL, S3 bucket...</text>

  <rect class="secret" x="1010" y="150" width="320" height="165" rx="16"/>
  <text class="h" x="1045" y="195">Secrets Manager</text>
  <text class="m" x="1045" y="225">/topicfollow/prod/web</text>
  <text class="s" x="1045" y="258">放敏感变量：</text>
  <text class="m" x="1070" y="286">DATABASE_URL</text>
  <text class="m" x="1070" y="310">AUTH_SECRET</text>

  <rect class="box" x="1010" y="420" width="320" height="135" rx="16"/>
  <text class="h" x="1045" y="465">CloudWatch Logs</text>
  <text class="m" x="1045" y="495">/topicfollow/prod/web</text>
  <text class="s" x="1045" y="525">container stdout/stderr 进这里</text>

  <rect class="iam" x="215" y="665" width="410" height="130" rx="16"/>
  <text class="h" x="250" y="710">Execution Role</text>
  <text class="m" x="250" y="740">ecsTaskExecutionRole</text>
  <text class="s" x="250" y="770">ECS 平台用：拉镜像、读 env、读 secret、写 logs</text>

  <rect class="iam" x="775" y="665" width="410" height="130" rx="16"/>
  <text class="h" x="810" y="710">Task Role</text>
  <text class="m" x="810" y="740">topicfollow-prod-web-task-role</text>
  <text class="s" x="810" y="770">应用代码用：读写 S3 uploads/</text>

  <rect class="data" x="1010" y="610" width="320" height="115" rx="16"/>
  <text class="h" x="1045" y="655">S3 uploads/</text>
  <text class="s" x="1045" y="685">用户上传文件长期保存处</text>

  <path class="arrow" d="M390 218 C445 218 450 335 475 350"/>
  <text class="m" x="410" y="250">拉 image</text>
  <path class="arrow" d="M390 482 C440 482 440 430 475 420"/>
  <text class="m" x="405" y="458">读取普通 env</text>
  <path class="arrow" d="M1010 235 C950 235 940 335 925 350"/>
  <text class="m" x="930" y="260">读取 secrets</text>
  <path class="arrow" d="M925 465 C970 465 980 488 1010 488"/>
  <text class="m" x="940" y="445">写日志</text>
  <path class="arrow dash" d="M420 665 C430 565 470 500 560 468"/>
  <path class="arrow dash" d="M980 665 C980 610 1010 672 1010 672"/>

  <rect class="box" x="70" y="35" width="1" height="1"/>
</svg>
