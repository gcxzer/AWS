<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">IAM permission mental model</title>
  <desc id="desc">A diagram explaining principal, role, policy, action, resource, condition, and CloudTrail audit logs.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .page { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475467; }
      .box { fill: #ffffff; stroke: #d0d5dd; stroke-width: 2.2; rx: 14; }
      .who { fill: #eef4ff; stroke: #175cd3; }
      .role { fill: #ecfdf3; stroke: #039855; }
      .policy { fill: #fff7ed; stroke: #f97316; }
      .resource { fill: #fdf2fa; stroke: #c11574; }
      .audit { fill: #f4f3ff; stroke: #7a5af8; }
      .label { font: 700 22px Arial, sans-serif; fill: #101828; }
      .body { font: 400 16px Arial, sans-serif; fill: #475467; }
      .tiny { font: 400 14px Arial, sans-serif; fill: #667085; }
      .code { font: 700 15px "SFMono-Regular", Consolas, monospace; fill: #344054; }
      .line { stroke: #344054; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #667085; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.8; rx: 12; }
      .noteText { font: 700 16px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>
  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 5：IAM 权限模型</text>
  <text class="subtitle" x="52" y="92">IAM 的核心问题永远是：谁，能不能，对哪个资源，做什么动作，在什么条件下。</text>

  <rect class="box who" x="72" y="220" width="220" height="132"/>
  <text class="label" x="104" y="262">Principal</text>
  <text class="body" x="104" y="292">谁发起请求</text>
  <text class="tiny" x="104" y="320">User / Role / AWS Service</text>

  <rect class="box role" x="382" y="220" width="220" height="132"/>
  <text class="label" x="414" y="262">Role</text>
  <text class="body" x="414" y="292">可被临时扮演</text>
  <text class="tiny" x="414" y="320">Lambda role / EC2 role</text>
  <path class="line" d="M292 286 L382 286"/>

  <rect class="box policy" x="692" y="178" width="250" height="216"/>
  <text class="label" x="724" y="220">Policy</text>
  <text class="body" x="724" y="250">权限规则 JSON</text>
  <text class="code" x="724" y="288">Effect: Allow</text>
  <text class="code" x="724" y="318">Action: s3:GetObject</text>
  <text class="code" x="724" y="348">Resource: arn:...</text>
  <path class="line" d="M602 286 L692 286"/>

  <rect class="box resource" x="1032" y="220" width="196" height="132"/>
  <text class="label" x="1064" y="262">Resource</text>
  <text class="body" x="1064" y="292">被操作对象</text>
  <text class="tiny" x="1064" y="320">S3 bucket / RDS / EC2</text>
  <path class="line" d="M942 286 L1032 286"/>

  <rect class="box" x="382" y="488" width="220" height="112"/>
  <text class="label" x="414" y="530">STS</text>
  <text class="body" x="414" y="560">发临时凭证</text>
  <text class="tiny" x="414" y="586">有过期时间</text>
  <path class="dash" d="M492 352 L492 488"/>

  <rect class="box audit" x="692" y="488" width="250" height="112"/>
  <text class="label" x="724" y="530">CloudTrail</text>
  <text class="body" x="724" y="560">记录 API 行为</text>
  <text class="tiny" x="724" y="586">谁在什么时候做了什么</text>
  <path class="dash" d="M817 394 L817 488"/>

  <rect class="note" x="72" y="682" width="1156" height="44"/>
  <text class="noteText" x="104" y="710">一句话：IAM 不负责运行应用，它只负责判断“这个请求有没有权限”。CloudTrail 负责留下审计记录。</text>
</svg>
