<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">S3 permissions and lifecycle model</title>
  <desc id="desc">A Chinese diagram explaining S3 IAM policy, bucket policy, public access block, KMS encryption, versioning, lifecycle, and Glacier.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .page { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475467; }
      .box { fill: #ffffff; stroke: #d0d5dd; stroke-width: 2; rx: 14; }
      .principal { fill: #eef4ff; stroke: #175cd3; stroke-width: 2.4; rx: 14; }
      .guard { fill: #fff7ed; stroke: #f97316; stroke-width: 2.4; rx: 14; }
      .bucket { fill: #ecfdf3; stroke: #039855; stroke-width: 3; rx: 22; }
      .data { fill: #fdf2fa; stroke: #c11574; stroke-width: 2.4; rx: 14; }
      .archive { fill: #f4f3ff; stroke: #7a5af8; stroke-width: 2.4; rx: 14; }
      .label { font: 700 21px Arial, sans-serif; fill: #101828; }
      .body { font: 400 15.5px Arial, sans-serif; fill: #475467; }
      .tiny { font: 400 13.5px Arial, sans-serif; fill: #667085; }
      .line { stroke: #344054; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #667085; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.8; rx: 12; }
      .noteText { font: 700 16px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>
  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 19：S3 权限和生命周期</text>
  <text class="subtitle" x="52" y="92">S3 不是“有链接就能访问”。真正能不能读写，要同时看身份权限、桶策略、公共访问阻止、加密和对象状态。</text>

  <rect class="principal" x="60" y="188" width="220" height="96"/>
  <text class="label" x="92" y="228">Principal</text>
  <text class="tiny" x="92" y="254">User / Role / App / AWS service</text>

  <rect class="guard" x="354" y="126" width="228" height="88"/>
  <text class="label" x="386" y="164">IAM Policy</text>
  <text class="tiny" x="386" y="190">这个身份允许做什么</text>

  <rect class="guard" x="354" y="248" width="228" height="88"/>
  <text class="label" x="386" y="286">Bucket Policy</text>
  <text class="tiny" x="386" y="312">这个桶允许谁访问</text>

  <rect class="guard" x="354" y="370" width="228" height="88"/>
  <text class="label" x="386" y="408">Block Public</text>
  <text class="label" x="386" y="432">Access</text>

  <path class="line" d="M280 236 C314 202 326 176 354 168"/>
  <path class="line" d="M280 236 L354 292"/>
  <path class="dash" d="M280 236 C320 320 330 384 354 410"/>

  <rect class="bucket" x="686" y="160" width="462" height="298"/>
  <text class="label" x="724" y="202">S3 Bucket</text>
  <text class="body" x="724" y="232">对象存储容器</text>

  <rect class="data" x="732" y="274" width="164" height="66"/>
  <text class="label" x="762" y="312">Object</text>
  <text class="tiny" x="762" y="332">file.jpg / log.json</text>

  <rect class="data" x="934" y="274" width="164" height="66"/>
  <text class="label" x="964" y="312">Versioning</text>
  <text class="tiny" x="964" y="332">防误删和覆盖</text>

  <rect class="data" x="732" y="364" width="164" height="66"/>
  <text class="label" x="762" y="402">Encryption</text>
  <text class="tiny" x="762" y="422">SSE-S3 / KMS</text>

  <rect class="data" x="934" y="364" width="164" height="66"/>
  <text class="label" x="964" y="402">Access Logs</text>
  <text class="tiny" x="964" y="422">谁读写过对象</text>

  <path class="line" d="M582 170 C622 176 646 190 686 204"/>
  <path class="line" d="M582 292 L686 300"/>
  <path class="dash" d="M582 414 C632 422 652 386 686 370"/>

  <rect class="archive" x="686" y="534" width="200" height="84"/>
  <text class="label" x="720" y="572">Lifecycle</text>
  <text class="tiny" x="720" y="598">自动转存或删除</text>

  <rect class="archive" x="948" y="534" width="200" height="84"/>
  <text class="label" x="982" y="572">Glacier</text>
  <text class="tiny" x="982" y="598">低成本长期归档</text>

  <path class="line" d="M814 458 L786 534"/>
  <path class="line" d="M886 576 L948 576"/>

  <rect class="note" x="60" y="684" width="1088" height="44"/>
  <text class="noteText" x="92" y="712">一句话：S3 访问要过权限门，数据要开加密和版本保护，旧数据用 Lifecycle 转到 Glacier 或自动清理。</text>
</svg>
