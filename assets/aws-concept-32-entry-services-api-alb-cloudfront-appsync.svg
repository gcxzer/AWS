<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">API Gateway ALB CloudFront AppSync comparison</title>
  <desc id="desc">A Chinese diagram comparing AWS entry services: CloudFront, ALB, API Gateway, and AppSync.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .page { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475467; }
      .box { fill: #ffffff; stroke: #d0d5dd; stroke-width: 2; rx: 14; }
      .front { fill: #eef4ff; stroke: #175cd3; stroke-width: 2.5; rx: 16; }
      .entry { fill: #fff7ed; stroke: #f97316; stroke-width: 2.5; rx: 16; }
      .compute { fill: #ecfdf3; stroke: #039855; stroke-width: 2.5; rx: 16; }
      .data { fill: #fdf2fa; stroke: #c11574; stroke-width: 2.4; rx: 14; }
      .label { font: 700 21px Arial, sans-serif; fill: #101828; }
      .body { font: 400 15.5px Arial, sans-serif; fill: #475467; }
      .tiny { font: 400 13.5px Arial, sans-serif; fill: #667085; }
      .line { stroke: #344054; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #667085; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.8; rx: 12; }
      .noteText { font: 700 16px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>
  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 30：CloudFront、ALB、API Gateway、AppSync 入口区别</text>
  <text class="subtitle" x="52" y="92">这些都可能站在用户请求前面，但它们管的不是同一层。</text>

  <rect class="box" x="66" y="326" width="166" height="86"/>
  <text class="label" x="98" y="366">User</text>
  <text class="tiny" x="98" y="392">浏览器 / App</text>

  <rect class="front" x="314" y="122" width="236" height="92"/>
  <text class="label" x="348" y="160">CloudFront</text>
  <text class="tiny" x="348" y="186">CDN、缓存、边缘入口</text>

  <rect class="entry" x="314" y="262" width="236" height="92"/>
  <text class="label" x="348" y="300">ALB</text>
  <text class="tiny" x="348" y="326">HTTP 负载均衡</text>

  <rect class="entry" x="314" y="402" width="236" height="92"/>
  <text class="label" x="348" y="440">API Gateway</text>
  <text class="tiny" x="348" y="466">REST/HTTP/WebSocket API</text>

  <rect class="entry" x="314" y="542" width="236" height="92"/>
  <text class="label" x="348" y="580">AppSync</text>
  <text class="tiny" x="348" y="606">GraphQL / Realtime PubSub</text>

  <path class="dash" d="M232 370 C278 270 292 190 314 168"/>
  <path class="line" d="M232 370 C278 340 292 320 314 308"/>
  <path class="line" d="M232 370 C278 402 292 426 314 448"/>
  <path class="line" d="M232 370 C278 500 292 560 314 588"/>

  <rect class="compute" x="704" y="250" width="204" height="82"/>
  <text class="label" x="738" y="288">ECS / EC2</text>
  <text class="tiny" x="738" y="314">长跑 Web 服务</text>

  <rect class="compute" x="704" y="390" width="204" height="82"/>
  <text class="label" x="738" y="428">Lambda</text>
  <text class="tiny" x="738" y="454">Serverless 后端</text>

  <rect class="data" x="704" y="530" width="204" height="82"/>
  <text class="label" x="738" y="568">DynamoDB/RDS</text>
  <text class="tiny" x="738" y="594">数据源</text>

  <rect class="data" x="976" y="122" width="204" height="82"/>
  <text class="label" x="1010" y="160">S3</text>
  <text class="tiny" x="1010" y="186">静态文件源站</text>

  <path class="line" d="M550 168 L976 162"/>
  <path class="line" d="M550 308 L704 292"/>
  <path class="line" d="M550 448 L704 432"/>
  <path class="line" d="M550 588 L704 572"/>
  <path class="dash" d="M806 472 L806 530"/>

  <rect class="box" x="976" y="338" width="204" height="118"/>
  <text class="label" x="1010" y="376">怎么选</text>
  <text class="tiny" x="1010" y="402">静态/全球加速：CloudFront</text>
  <text class="tiny" x="1010" y="424">容器/EC2 Web：ALB</text>
  <text class="tiny" x="1010" y="446">API 管理：API Gateway</text>

  <rect class="note" x="66" y="684" width="1114" height="44"/>
  <text class="noteText" x="98" y="712">一句话：CloudFront 是边缘缓存层，ALB 是负载均衡入口，API Gateway 是 API 门面，AppSync 是 GraphQL/实时数据入口。</text>
</svg>
