<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">TopicFollow 安全组关系</title>
  <desc id="desc">展示 ALB、ECS 和 RDS 三个安全组如何限制访问路径。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto"><path d="M0,0 L12,4.5 L0,9 Z" fill="#0f172a"/></marker>
    <style>
      .bg{fill:#f8fafc}.sg{fill:#fff;stroke:#0f172a;stroke-width:2.5}.allow{fill:#ecfdf5;stroke:#16a34a;stroke-width:3}
      .deny{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.h{font:700 24px Arial,sans-serif;fill:#0f172a}
      .title{font:700 34px Arial,sans-serif;fill:#0f172a}.t{font:17px Arial,sans-serif;fill:#334155}.s{font:15px Arial,sans-serif;fill:#475569}
      .m{font:14px Consolas,monospace;fill:#1e293b}.arrow{stroke:#0f172a;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .smallArrow{stroke:#16a34a;stroke-width:3;fill:none;marker-end:url(#arrow)}.bad{stroke:#dc2626;stroke-width:3;fill:none;stroke-dasharray:10 8}
    </style>
  </defs>
  <rect class="bg" width="1400" height="820"/>
  <text class="title" x="48" y="58">图 2：安全组到底在挡什么</text>
  <text class="t" x="48" y="90">把它想成三道门：公网只能进 ALB；ALB 才能进 ECS；ECS 才能进数据库。</text>

  <rect class="sg" x="70" y="180" width="300" height="220" rx="18"/>
  <text class="h" x="110" y="225">公网 Internet</text>
  <text class="s" x="110" y="265">任何用户</text>
  <text class="s" x="110" y="292">浏览器 / curl / Cloudflare</text>

  <rect class="allow" x="530" y="150" width="330" height="270" rx="18"/>
  <text class="h" x="565" y="195">ALB Security Group</text>
  <text class="m" x="565" y="225">sg-00394479ba2e93c4d</text>
  <text class="s" x="565" y="265">允许进入：</text>
  <text class="m" x="590" y="294">HTTP 80  from 0.0.0.0/0</text>
  <text class="m" x="590" y="322">HTTPS 443 from 0.0.0.0/0</text>
  <text class="s" x="565" y="362">作用：公网入口</text>

  <rect class="allow" x="1010" y="150" width="330" height="270" rx="18"/>
  <text class="h" x="1045" y="195">ECS Service SG</text>
  <text class="m" x="1045" y="225">sg-0ba3af6d70566127f</text>
  <text class="s" x="1045" y="265">允许进入：</text>
  <text class="m" x="1070" y="294">TCP 3000 from ALB SG</text>
  <text class="s" x="1045" y="342">不允许公网直接访问 task</text>

  <rect class="allow" x="1010" y="535" width="330" height="190" rx="18"/>
  <text class="h" x="1045" y="580">RDS Security Group</text>
  <text class="m" x="1045" y="610">sg-0cb247a8aeb04623a</text>
  <text class="s" x="1045" y="650">允许进入：</text>
  <text class="m" x="1070" y="678">PostgreSQL 5432 from ECS SG</text>

  <path class="arrow" d="M370 290 C435 290 460 285 530 285"/>
  <text class="m" x="405" y="260">80 / 443</text>
  <path class="arrow" d="M860 285 C920 285 945 285 1010 285"/>
  <text class="m" x="900" y="260">3000</text>
  <path class="arrow" d="M1175 420 L1175 535"/>
  <text class="m" x="1195" y="486">5432</text>

  <path class="bad" d="M245 400 C450 580 760 650 1010 650"/>
  <text class="t" x="350" y="610">公网不能直接连 RDS</text>
  <path class="bad" d="M245 350 C500 480 735 360 1010 340"/>
  <text class="t" x="410" y="440">公网不能直接连 ECS task</text>

  <rect class="deny" x="70" y="535" width="650" height="105" rx="14"/>
  <text class="h" x="105" y="580">为什么这样安全？</text>
  <text class="t" x="105" y="615">数据库没有公网入口；ECS task 也没有公网入口。公网流量只能先经过 ALB。</text>
</svg>
