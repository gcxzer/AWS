<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">ALB Target Group Health Check Auto Scaling</title>
  <desc id="desc">A Chinese diagram explaining ALB, listener rules, target groups, health checks, ECS or EC2 targets, CloudWatch metrics, and Auto Scaling.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .page { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475467; }
      .box { fill: #ffffff; stroke: #d0d5dd; stroke-width: 2; rx: 14; }
      .edge { fill: #eef4ff; stroke: #175cd3; stroke-width: 2.4; rx: 14; }
      .alb { fill: #fff7ed; stroke: #f97316; stroke-width: 3; rx: 20; }
      .tg { fill: #ecfdf3; stroke: #039855; stroke-width: 2.6; rx: 16; }
      .target { fill: #fdf2fa; stroke: #c11574; stroke-width: 2.4; rx: 14; }
      .ops { fill: #f4f3ff; stroke: #7a5af8; stroke-width: 2.4; rx: 14; }
      .label { font: 700 21px Arial, sans-serif; fill: #101828; }
      .body { font: 400 15.5px Arial, sans-serif; fill: #475467; }
      .tiny { font: 400 13.5px Arial, sans-serif; fill: #667085; }
      .line { stroke: #344054; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #667085; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.8; rx: 12; }
      .noteText { font: 700 16px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>
  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 17：ALB、Target Group、Health Check、Auto Scaling</text>
  <text class="subtitle" x="52" y="92">部署 Web App 时，ALB 是入口，Target Group 是后端名单，Health Check 决定哪些后端能接流量。</text>

  <rect class="edge" x="54" y="228" width="168" height="92"/>
  <text class="label" x="88" y="268">User</text>
  <text class="tiny" x="88" y="294">浏览器请求</text>

  <rect class="edge" x="284" y="228" width="190" height="92"/>
  <text class="label" x="318" y="268">Route 53</text>
  <text class="tiny" x="318" y="294">域名指向入口</text>
  <path class="line" d="M222 274 L284 274"/>

  <rect class="alb" x="536" y="170" width="230" height="208"/>
  <text class="label" x="576" y="214">ALB</text>
  <text class="body" x="576" y="244">Application</text>
  <text class="body" x="576" y="270">Load Balancer</text>
  <text class="tiny" x="576" y="306">Listener: 80 / 443</text>
  <text class="tiny" x="576" y="330">Rules: path / host</text>
  <path class="line" d="M474 274 L536 274"/>

  <rect class="tg" x="850" y="188" width="228" height="150"/>
  <text class="label" x="884" y="228">Target Group</text>
  <text class="body" x="884" y="258">后端目标名单</text>
  <text class="tiny" x="884" y="286">health check: /health</text>
  <text class="tiny" x="884" y="310">只转发给 healthy target</text>
  <path class="line" d="M766 274 L850 264"/>

  <rect class="target" x="890" y="412" width="150" height="74"/>
  <text class="label" x="920" y="450">Task A</text>
  <text class="tiny" x="920" y="472">healthy</text>

  <rect class="target" x="1068" y="412" width="150" height="74"/>
  <text class="label" x="1098" y="450">Task B</text>
  <text class="tiny" x="1098" y="472">healthy</text>

  <path class="line" d="M964 338 L964 412"/>
  <path class="line" d="M1000 338 C1054 366 1090 386 1142 412"/>

  <rect class="ops" x="302" y="484" width="238" height="92"/>
  <text class="label" x="336" y="522">CloudWatch</text>
  <text class="tiny" x="336" y="548">CPU、请求数、延迟、错误率</text>

  <rect class="ops" x="610" y="484" width="238" height="92"/>
  <text class="label" x="644" y="522">Auto Scaling</text>
  <text class="tiny" x="644" y="548">流量高就加 Task/实例</text>

  <path class="dash" d="M540 530 L610 530"/>
  <path class="dash" d="M728 484 C784 442 832 422 890 420"/>
  <path class="dash" d="M728 484 C840 478 966 480 1068 454"/>

  <rect class="box" x="54" y="484" width="184" height="92"/>
  <text class="label" x="88" y="522">Security Group</text>
  <text class="tiny" x="88" y="548">ALB 允许 443</text>
  <text class="tiny" x="88" y="568">Target 只允许 ALB</text>

  <rect class="note" x="54" y="684" width="1164" height="44"/>
  <text class="noteText" x="86" y="712">一句话：ALB 接用户请求，Target Group 管后端名单，Health Check 剔除坏后端，Auto Scaling 决定后端数量。</text>
</svg>
