<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">What renting an EC2 instance includes</title>
  <desc id="desc">A diagram explaining EC2 instance, AMI, EBS, security group, key pair, IAM role, subnet, and optional Elastic IP.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .page { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475467; }
      .box { fill: #ffffff; stroke: #d0d5dd; stroke-width: 2; rx: 14; }
      .main { fill: #eef4ff; stroke: #175cd3; stroke-width: 3; rx: 18; }
      .net { fill: #fff7ed; stroke: #f97316; stroke-width: 2.5; rx: 18; }
      .disk { fill: #ecfdf3; stroke: #039855; stroke-width: 2.4; rx: 14; }
      .sec { fill: #fdf2fa; stroke: #c11574; stroke-width: 2.4; rx: 14; }
      .label { font: 700 22px Arial, sans-serif; fill: #101828; }
      .body { font: 400 16px Arial, sans-serif; fill: #475467; }
      .tiny { font: 400 14px Arial, sans-serif; fill: #667085; }
      .line { stroke: #344054; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #667085; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.8; rx: 12; }
      .noteText { font: 700 16px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>
  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 2：租一台 EC2，到底租了什么</text>
  <text class="subtitle" x="52" y="92">EC2 不是孤零零一台机器，它启动时会同时牵涉镜像、磁盘、网络、安全组、登录密钥和权限角色。</text>

  <rect class="net" x="340" y="166" width="600" height="424"/>
  <text class="label" x="374" y="206">VPC / Subnet</text>
  <text class="body" x="374" y="234">实例必须放进某个子网，拿到私有 IP。</text>

  <rect class="main" x="488" y="300" width="304" height="150"/>
  <text class="label" x="536" y="346">EC2 Instance</text>
  <text class="body" x="536" y="378">CPU / Memory / GPU</text>
  <text class="tiny" x="536" y="406">例如 g5.xlarge, m7i.large</text>

  <rect class="box" x="74" y="168" width="230" height="112"/>
  <text class="label" x="104" y="210">AMI</text>
  <text class="body" x="104" y="240">操作系统模板</text>
  <text class="tiny" x="104" y="264">Ubuntu / Deep Learning AMI</text>
  <path class="line" d="M304 224 C376 224 414 282 488 328"/>

  <rect class="disk" x="74" y="464" width="230" height="112"/>
  <text class="label" x="104" y="506">EBS Volume</text>
  <text class="body" x="104" y="536">云硬盘</text>
  <text class="tiny" x="104" y="560">停止实例后通常还在</text>
  <path class="line" d="M304 520 C378 506 420 454 488 414"/>

  <rect class="sec" x="976" y="168" width="230" height="112"/>
  <text class="label" x="1006" y="210">Security Group</text>
  <text class="body" x="1006" y="240">虚拟防火墙</text>
  <text class="tiny" x="1006" y="264">控制入站/出站端口</text>
  <path class="line" d="M976 224 C904 224 862 286 792 330"/>

  <rect class="box" x="976" y="320" width="230" height="112"/>
  <text class="label" x="1006" y="362">Key Pair</text>
  <text class="body" x="1006" y="392">SSH 登录钥匙</text>
  <text class="tiny" x="1006" y="416">Linux 常见入口</text>
  <path class="dash" d="M976 376 L792 376"/>

  <rect class="box" x="976" y="472" width="230" height="112"/>
  <text class="label" x="1006" y="514">IAM Role</text>
  <text class="body" x="1006" y="544">实例临时权限</text>
  <text class="tiny" x="1006" y="568">访问 S3 等 AWS API</text>
  <path class="dash" d="M976 528 C904 510 858 456 792 424"/>

  <rect class="box" x="482" y="620" width="316" height="62"/>
  <text class="label" x="520" y="660">Elastic IP 可选</text>
  <text class="tiny" x="520" y="680">需要固定公网 IP 时才绑定</text>
  <path class="dash" d="M640 620 L640 450"/>

  <rect class="note" x="74" y="704" width="1132" height="40"/>
  <text class="noteText" x="104" y="730">一句话：EC2 是算力，AMI 是启动模板，EBS 是硬盘，Security Group 是门禁，VPC/Subnet 是网络位置。</text>
</svg>
