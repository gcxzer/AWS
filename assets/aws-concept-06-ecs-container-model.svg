<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">ECS container model</title>
  <desc id="desc">A diagram explaining Docker image, ECR, ECS task definition, service, tasks, Fargate, cluster, and ALB.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .page { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475467; }
      .cluster { fill: #fff7ed; stroke: #f97316; stroke-width: 3; rx: 22; }
      .box { fill: #ffffff; stroke: #d0d5dd; stroke-width: 2.2; rx: 14; }
      .source { fill: #eef4ff; stroke: #175cd3; }
      .repo { fill: #ecfdf3; stroke: #039855; }
      .taskdef { fill: #f4f3ff; stroke: #7a5af8; }
      .service { fill: #fdf2fa; stroke: #c11574; }
      .task { fill: #ffffff; stroke: #98a2b3; }
      .label { font: 700 21px Arial, sans-serif; fill: #101828; }
      .body { font: 400 15.5px Arial, sans-serif; fill: #475467; }
      .tiny { font: 400 13.5px Arial, sans-serif; fill: #667085; }
      .line { stroke: #344054; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #667085; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.8; rx: 12; }
      .noteText { font: 700 16px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>
  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 6：ECS 容器模型</text>
  <text class="subtitle" x="52" y="92">ECR 放镜像，Task Definition 写运行说明书，Service 负责长期维持 N 个 Task 在跑。</text>

  <rect class="box source" x="58" y="198" width="186" height="114"/>
  <text class="label" x="88" y="238">Dockerfile</text>
  <text class="body" x="88" y="268">build image</text>
  <text class="tiny" x="88" y="292">应用打包</text>

  <rect class="box repo" x="308" y="198" width="190" height="114"/>
  <text class="label" x="338" y="238">ECR</text>
  <text class="body" x="338" y="268">Image registry</text>
  <text class="tiny" x="338" y="292">保存容器镜像</text>
  <path class="line" d="M244 256 L308 256"/>

  <rect class="box taskdef" x="562" y="198" width="234" height="114"/>
  <text class="label" x="592" y="238">Task Definition</text>
  <text class="body" x="592" y="268">运行说明书</text>
  <text class="tiny" x="592" y="292">image, cpu, memory, port, env</text>
  <path class="line" d="M498 256 L562 256"/>

  <rect class="cluster" x="316" y="398" width="850" height="240"/>
  <text class="label" x="350" y="438">ECS Cluster</text>
  <text class="body" x="350" y="466">容器运行的逻辑空间。底层可以是 Fargate，也可以是 EC2 instances。</text>

  <rect class="box service" x="852" y="198" width="216" height="114"/>
  <text class="label" x="882" y="238">Service</text>
  <text class="body" x="882" y="268">长期运行</text>
  <text class="tiny" x="882" y="292">desired count = 2</text>
  <path class="line" d="M796 256 L852 256"/>
  <path class="line" d="M960 312 L960 398"/>

  <rect class="box task" x="472" y="508" width="172" height="78"/>
  <text class="label" x="504" y="544">Task 1</text>
  <text class="tiny" x="504" y="568">一个正在跑的容器实例</text>

  <rect class="box task" x="700" y="508" width="172" height="78"/>
  <text class="label" x="732" y="544">Task 2</text>
  <text class="tiny" x="732" y="568">同一份定义的副本</text>

  <rect class="box task" x="928" y="508" width="172" height="78"/>
  <text class="label" x="960" y="544">Fargate</text>
  <text class="tiny" x="960" y="568">不用管理服务器</text>

  <rect class="box" x="58" y="510" width="186" height="76"/>
  <text class="label" x="88" y="548">ALB</text>
  <text class="tiny" x="88" y="572">把请求转给健康 Task</text>
  <path class="line" d="M244 548 L472 548"/>
  <path class="dash" d="M960 398 C880 464 764 488 558 508"/>

  <rect class="note" x="58" y="690" width="1108" height="44"/>
  <text class="noteText" x="90" y="718">一句话：镜像是应用包，Task Definition 是运行说明书，Task 是真正跑起来的容器，Service 负责别让它少跑。</text>
</svg>
