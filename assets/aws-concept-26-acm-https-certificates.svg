<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">ACM HTTPS certificates</title>
  <desc id="desc">ACM, DNS validation, CloudFront, ALB, API Gateway, and origins.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/></marker>
    <style>
      .page{fill:#f6f8fb}.title{font:700 34px Arial,sans-serif;fill:#111827}.subtitle{font:400 18px Arial,sans-serif;fill:#475467}
      .box{fill:#fff;stroke:#d0d5dd;stroke-width:2;rx:14}.dns{fill:#eef4ff;stroke:#175cd3;stroke-width:2.4;rx:14}.acm{fill:#fff7ed;stroke:#f97316;stroke-width:2.8;rx:18}
      .entry{fill:#ecfdf3;stroke:#039855;stroke-width:2.4;rx:14}.origin{fill:#fdf2fa;stroke:#c11574;stroke-width:2.4;rx:14}.warn{fill:#fffaeb;stroke:#dc6803;stroke-width:2;rx:12}
      .label{font:700 21px Arial,sans-serif;fill:#101828}.body{font:400 15.5px Arial,sans-serif;fill:#475467}.tiny{font:400 13.5px Arial,sans-serif;fill:#667085}
      .line{stroke:#344054;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.dash{stroke:#667085;stroke-width:2.2;stroke-dasharray:8 7;fill:none;marker-end:url(#arrow)}
      .note{fill:#fff;stroke:#d0d5dd;stroke-width:1.8;rx:12}.noteText{font:700 16px Arial,sans-serif;fill:#344054}
    </style>
  </defs>
  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 24：ACM、HTTPS、证书放在哪里</text>
  <text class="subtitle" x="52" y="92">HTTPS 证书通常挂在 CloudFront、ALB 或 API Gateway 这些入口服务上，不是塞进业务代码里。</text>
  <rect class="box" x="62" y="238" width="162" height="86"/><text class="label" x="94" y="278">User</text><text class="tiny" x="94" y="304">浏览器 HTTPS</text>
  <rect class="dns" x="286" y="238" width="190" height="86"/><text class="label" x="318" y="278">DNS</text><text class="tiny" x="318" y="304">Route 53 / Cloudflare</text><path class="line" d="M224 282 L286 282"/>
  <rect class="acm" x="538" y="156" width="230" height="146"/><text class="label" x="574" y="198">ACM</text><text class="body" x="574" y="228">证书管理</text><text class="tiny" x="574" y="254">申请 / 验证 / 续期</text><path class="dash" d="M476 264 C506 230 516 214 538 204"/>
  <rect class="entry" x="850" y="122" width="228" height="82"/><text class="label" x="882" y="160">CloudFront</text><text class="tiny" x="882" y="186">全球边缘 HTTPS</text>
  <rect class="entry" x="850" y="266" width="228" height="82"/><text class="label" x="882" y="304">ALB</text><text class="tiny" x="882" y="330">VPC Web 入口</text>
  <rect class="entry" x="850" y="410" width="228" height="82"/><text class="label" x="882" y="448">API Gateway</text><text class="tiny" x="882" y="474">API 自定义域名</text>
  <path class="line" d="M768 202 C804 184 818 174 850 164"/><path class="line" d="M768 230 C810 262 820 288 850 306"/><path class="line" d="M768 260 C822 330 828 396 850 450"/>
  <rect class="origin" x="514" y="494" width="178" height="78"/><text class="label" x="546" y="532">S3</text><text class="tiny" x="546" y="556">静态源站</text>
  <rect class="origin" x="742" y="494" width="178" height="78"/><text class="label" x="774" y="532">ECS / EC2</text><text class="tiny" x="774" y="556">应用服务</text>
  <rect class="origin" x="970" y="494" width="178" height="78"/><text class="label" x="1002" y="532">Lambda</text><text class="tiny" x="1002" y="556">函数后端</text>
  <path class="line" d="M964 204 C930 360 758 436 602 494"/><path class="line" d="M964 348 C920 418 872 462 832 494"/><path class="line" d="M964 492 L1058 494"/>
  <rect class="warn" x="62" y="488" width="318" height="92"/><text class="label" x="94" y="526">Region 小坑</text><text class="tiny" x="94" y="552">CloudFront 证书通常在 us-east-1</text><text class="tiny" x="94" y="572">ALB/API 证书在对应 Region</text>
  <rect class="note" x="62" y="684" width="1086" height="44"/><text class="noteText" x="94" y="712">一句话：ACM 管证书，DNS 验证域名所有权，证书挂在入口服务上，入口再把请求转给源站。</text>
</svg>
