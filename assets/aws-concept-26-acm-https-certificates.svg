<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-labelledby="title desc">
  <title id="title">TopicFollow ACM HTTPS mental model</title>
  <desc id="desc">Cloudflare, AWS ACM, DNS validation, ALB HTTPS listener, and ECS request path for TopicFollow.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263544"/>
    </marker>
    <marker id="orangeArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
    <marker id="greenArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
    </marker>
    <style>
      .page{fill:#f6f8fb}
      .title{font:700 35px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0f172a}
      .subtitle{font:400 18px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#475569}
      .section{font:700 19px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#334155}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}
      .browser{fill:#eff6ff;stroke:#2563eb;stroke-width:2.4;rx:18}
      .cloudflare{fill:#fff7ed;stroke:#f97316;stroke-width:2.8;rx:18}
      .aws{fill:#ecfdf5;stroke:#16a34a;stroke-width:2.4;rx:18}
      .acm{fill:#fefce8;stroke:#ca8a04;stroke-width:2.4;rx:18}
      .dns{fill:#f8fafc;stroke:#64748b;stroke-width:2.2;rx:16}
      .warn{fill:#fff7ed;stroke:#c2410c;stroke-width:2.1;rx:16}
      .ok{fill:#f0fdf4;stroke:#15803d;stroke-width:2.1;rx:16}
      .label{font:700 23px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0f172a}
      .body{font:400 16px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#475569}
      .small{font:400 14px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#64748b}
      .mono{font:500 14px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
      .pill{fill:#e2e8f0;stroke:#cbd5e1;stroke-width:1.4;rx:16}
      .pillText{font:700 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#334155}
      .line{stroke:#263544;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .greenLine{stroke:#15803d;stroke-width:3;fill:none;marker-end:url(#greenArrow)}
      .orangeLine{stroke:#c2410c;stroke-width:3;fill:none;marker-end:url(#orangeArrow)}
      .dash{stroke:#64748b;stroke-width:2.6;stroke-dasharray:8 8;fill:none;marker-end:url(#arrow)}
      .soft{stroke:#94a3b8;stroke-width:2.2;stroke-dasharray:6 7;fill:none}
      .num{fill:#0f172a}
      .numText{font:700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#fff}
    </style>
  </defs>

  <rect class="page" width="1500" height="920"/>
  <text class="title" x="58" y="62">图 24：ACM 在你的 TopicFollow HTTPS 里到底干什么</text>
  <text class="subtitle" x="58" y="96">一句话：Cloudflare 负责用户入口，ACM 负责给 AWS ALB 发证书，ALB 再把 HTTPS 请求转给 ECS。</text>

  <text class="section" x="58" y="154">A. 真实访问链路：用户打开 topicfollow.com 时，请求这样走</text>

  <rect class="browser" x="58" y="190" width="220" height="132"/>
  <text class="label" x="90" y="236">Browser</text>
  <text class="body" x="90" y="266">用户访问</text>
  <text class="mono" x="90" y="294">https://topicfollow.com</text>

  <rect class="cloudflare" x="370" y="176" width="260" height="160"/>
  <text class="label" x="406" y="222">Cloudflare</text>
  <text class="body" x="406" y="252">DNS + Proxy</text>
  <text class="small" x="406" y="282">橙云记录：topicfollow.com</text>
  <text class="small" x="406" y="306">SSL/TLS：Full strict</text>

  <rect class="aws" x="720" y="176" width="276" height="160"/>
  <text class="label" x="756" y="222">AWS ALB</text>
  <text class="body" x="756" y="252">公网 HTTPS 入口</text>
  <text class="small" x="756" y="282">Listener 443 使用 ACM 证书</text>
  <text class="small" x="756" y="306">Listener 80 redirect 到 443</text>

  <rect class="aws" x="1086" y="176" width="236" height="160"/>
  <text class="label" x="1122" y="222">ECS Task</text>
  <text class="body" x="1122" y="252">Next.js 网站</text>
  <text class="small" x="1122" y="282">运行应用代码</text>
  <text class="small" x="1122" y="306">不自己管理 HTTPS 证书</text>

  <path class="line" d="M278 256 H370"/>
  <path class="orangeLine" d="M630 256 H720"/>
  <path class="greenLine" d="M996 256 H1086"/>

  <rect class="pill" x="305" y="218" width="44" height="28"/><text class="pillText" x="319" y="237">1</text>
  <rect class="pill" x="664" y="218" width="44" height="28"/><text class="pillText" x="678" y="237">2</text>
  <rect class="pill" x="1028" y="218" width="44" height="28"/><text class="pillText" x="1042" y="237">3</text>

  <text class="small" x="292" y="286">浏览器信任 Cloudflare 边缘证书</text>
  <text class="small" x="646" y="286">Cloudflare 回源时验证 ALB 证书</text>
  <text class="small" x="1018" y="286">ALB 转发普通应用请求</text>

  <text class="section" x="58" y="416">B. 证书验证链路：ACM 怎么确认这个域名真是你的</text>

  <rect class="acm" x="58" y="454" width="270" height="160"/>
  <text class="label" x="94" y="500">AWS ACM</text>
  <text class="body" x="94" y="530">Certificate Manager</text>
  <text class="small" x="94" y="560">为 topicfollow.com / www</text>
  <text class="small" x="94" y="584">申请、验证、续期证书</text>

  <rect class="dns" x="430" y="430" width="360" height="208"/>
  <text class="label" x="466" y="476">Cloudflare DNS</text>
  <text class="body" x="466" y="506">保存 ACM 给你的验证 CNAME</text>
  <text class="mono" x="466" y="540">_dd0e...  CNAME  _d5d5...</text>
  <text class="mono" x="466" y="570">_ef69...  CNAME  _6d0b...</text>
  <text class="small" x="466" y="604">这些记录必须 DNS only，不开橙云</text>

  <rect class="ok" x="900" y="454" width="286" height="160"/>
  <text class="label" x="936" y="500">ACM 验证通过</text>
  <text class="body" x="936" y="530">证书状态变成 Issued</text>
  <text class="small" x="936" y="560">之后 ACM 自动续期</text>
  <text class="small" x="936" y="584">前提是 CNAME 不要删</text>

  <rect class="aws" x="1260" y="454" width="182" height="160"/>
  <text class="label" x="1296" y="500">ALB 443</text>
  <text class="body" x="1296" y="530">挂载 ACM 证书</text>
  <text class="small" x="1296" y="560">Cloudflare Full strict</text>
  <text class="small" x="1296" y="584">才会信任它</text>

  <path class="dash" d="M328 534 H430"/>
  <path class="dash" d="M790 534 H900"/>
  <path class="greenLine" d="M1186 534 H1260"/>

  <rect class="pill" x="356" y="496" width="44" height="28"/><text class="pillText" x="370" y="515">4</text>
  <rect class="pill" x="824" y="496" width="44" height="28"/><text class="pillText" x="838" y="515">5</text>
  <rect class="pill" x="1210" y="496" width="44" height="28"/><text class="pillText" x="1224" y="515">6</text>

  <text class="small" x="348" y="570">ACM 叫你添加 DNS 记录</text>
  <text class="small" x="806" y="570">ACM 查询 DNS，确认你控制域名</text>
  <text class="small" x="1200" y="570">证书挂到 ALB</text>

  <path class="soft" d="M1350 454 C1322 384 1098 358 858 336"/>
  <text class="small" x="1138" y="386">ALB 上的证书来自 ACM，不来自 Cloudflare</text>

  <rect class="ok" x="58" y="706" width="414" height="112"/>
  <text class="label" x="94" y="750">现在不要改的东西</text>
  <text class="small" x="94" y="780">Cloudflare SSL/TLS 保持 Full strict</text>
  <text class="small" x="94" y="804">ACM 验证 CNAME 保持 DNS only</text>

  <rect class="warn" x="544" y="706" width="410" height="112"/>
  <text class="label" x="580" y="750">最容易误解的点</text>
  <text class="small" x="580" y="780">ACM 不接收用户请求，也不是服务器</text>
  <text class="small" x="580" y="804">它只是证书管家，证书真正挂在 ALB 上</text>

  <rect class="box" x="1026" y="706" width="416" height="112"/>
  <text class="label" x="1062" y="750">你的当前方案</text>
  <text class="small" x="1062" y="780">Cloudflare Proxy -> AWS ALB -> ECS</text>
  <text class="small" x="1062" y="804">Route 53 和 CloudFront 当前不是必需组件</text>

  <rect class="box" x="58" y="858" width="1384" height="40"/>
  <text class="body" x="86" y="884">记忆句：Cloudflare 是门口接待，ACM 是给 AWS 门口签身份证的机构，ALB 拿着这张身份证接 HTTPS，然后把请求交给 ECS。</text>
</svg>
