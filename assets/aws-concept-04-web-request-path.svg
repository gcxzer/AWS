<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">A common AWS web request path</title>
  <desc id="desc">A diagram explaining the path from user, Route 53, CloudFront, ALB or API Gateway, compute, and data services.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .page { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475467; }
      .box { fill: #ffffff; stroke: #d0d5dd; stroke-width: 2.2; rx: 14; }
      .dns { fill: #eef4ff; stroke: #175cd3; }
      .cdn { fill: #ecfdf3; stroke: #039855; }
      .entry { fill: #fff7ed; stroke: #f97316; }
      .compute { fill: #fdf2fa; stroke: #c11574; }
      .data { fill: #f4f3ff; stroke: #7a5af8; }
      .label { font: 700 21px Arial, sans-serif; fill: #101828; }
      .body { font: 400 15.5px Arial, sans-serif; fill: #475467; }
      .tiny { font: 400 13.5px Arial, sans-serif; fill: #667085; }
      .line { stroke: #344054; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #667085; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.8; rx: 12; }
      .noteText { font: 700 16px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>
  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 4：一个网站请求在 AWS 里的常见路径</text>
  <text class="subtitle" x="52" y="92">不是每个项目都全用这些服务，但这条链路能帮你分清 DNS、CDN、入口、计算和数据层。</text>

  <rect class="box" x="50" y="238" width="150" height="102"/>
  <text class="label" x="84" y="278">User</text>
  <text class="tiny" x="84" y="306">浏览器/手机</text>

  <rect class="box dns" x="258" y="222" width="176" height="134"/>
  <text class="label" x="288" y="262">Route 53</text>
  <text class="body" x="288" y="292">DNS</text>
  <text class="tiny" x="288" y="318">把域名指向入口</text>
  <path class="line" d="M200 290 L258 290"/>

  <rect class="box cdn" x="492" y="222" width="188" height="134"/>
  <text class="label" x="522" y="262">CloudFront</text>
  <text class="body" x="522" y="292">CDN / 缓存</text>
  <text class="tiny" x="522" y="318">离用户近，减少延迟</text>
  <path class="line" d="M434 290 L492 290"/>

  <rect class="box entry" x="748" y="142" width="190" height="124"/>
  <text class="label" x="778" y="182">ALB</text>
  <text class="body" x="778" y="212">网站/API 入口</text>
  <text class="tiny" x="778" y="238">转发到 ECS/EC2</text>
  <path class="line" d="M680 272 C708 246 722 226 748 204"/>

  <rect class="box entry" x="748" y="326" width="190" height="124"/>
  <text class="label" x="778" y="366">API Gateway</text>
  <text class="body" x="778" y="396">API 入口</text>
  <text class="tiny" x="778" y="422">常接 Lambda</text>
  <path class="line" d="M680 306 C708 332 722 362 748 388"/>

  <rect class="box compute" x="1008" y="142" width="210" height="124"/>
  <text class="label" x="1038" y="182">ECS / EC2</text>
  <text class="body" x="1038" y="212">长跑应用服务</text>
  <text class="tiny" x="1038" y="238">容器或虚拟机</text>
  <path class="line" d="M938 204 L1008 204"/>

  <rect class="box compute" x="1008" y="326" width="210" height="124"/>
  <text class="label" x="1038" y="366">Lambda</text>
  <text class="body" x="1038" y="396">短任务函数</text>
  <text class="tiny" x="1038" y="422">事件触发</text>
  <path class="line" d="M938 388 L1008 388"/>

  <rect class="box data" x="772" y="548" width="184" height="92"/>
  <text class="label" x="804" y="586">RDS</text>
  <text class="tiny" x="804" y="614">关系型业务数据</text>

  <rect class="box data" x="1018" y="548" width="184" height="92"/>
  <text class="label" x="1050" y="586">S3</text>
  <text class="tiny" x="1050" y="614">文件/图片/静态资源</text>

  <path class="dash" d="M1110 266 C1062 410 926 470 864 548"/>
  <path class="dash" d="M1110 450 C1110 486 1110 512 1110 548"/>

  <rect class="note" x="50" y="686" width="1168" height="44"/>
  <text class="noteText" x="82" y="714">一句话：Route 53 找入口，CloudFront 加速，ALB/API Gateway 接请求，ECS/EC2/Lambda 执行代码，RDS/S3 存数据。</text>
</svg>
