<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Bedrock SageMaker Amazon Q comparison</title>
  <desc id="desc">A Chinese diagram comparing Amazon Bedrock, SageMaker AI, and Amazon Q.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .page { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475467; }
      .box { fill: #ffffff; stroke: #d0d5dd; stroke-width: 2; rx: 14; }
      .app { fill: #eef4ff; stroke: #175cd3; stroke-width: 2.5; rx: 16; }
      .bedrock { fill: #fff7ed; stroke: #f97316; stroke-width: 2.5; rx: 16; }
      .sagemaker { fill: #ecfdf3; stroke: #039855; stroke-width: 2.5; rx: 16; }
      .q { fill: #fdf2fa; stroke: #c11574; stroke-width: 2.5; rx: 16; }
      .data { fill: #f4f3ff; stroke: #7a5af8; stroke-width: 2.4; rx: 14; }
      .label { font: 700 21px Arial, sans-serif; fill: #101828; }
      .body { font: 400 15.5px Arial, sans-serif; fill: #475467; }
      .tiny { font: 400 13.5px Arial, sans-serif; fill: #667085; }
      .line { stroke: #344054; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #667085; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.8; rx: 12; }
      .noteText { font: 700 16px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>
  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 32：Bedrock、SageMaker、Amazon Q 区别</text>
  <text class="subtitle" x="52" y="92">AI 这块先分三条线：调用大模型、自建/训练模型、直接用成品助手。</text>

  <rect class="app" x="66" y="170" width="224" height="104"/>
  <text class="label" x="100" y="210">你的 AI 应用</text>
  <text class="tiny" x="100" y="236">聊天、总结、RAG、Agent</text>

  <rect class="bedrock" x="406" y="134" width="286" height="142"/>
  <text class="label" x="440" y="174">Amazon Bedrock</text>
  <text class="body" x="440" y="204">调用基础模型 FM</text>
  <text class="tiny" x="440" y="232">Claude / Nova / Llama 等</text>
  <text class="tiny" x="440" y="254">RAG、Guardrails、Agents</text>
  <path class="line" d="M290 222 L406 204"/>

  <rect class="sagemaker" x="406" y="332" width="286" height="142"/>
  <text class="label" x="440" y="372">SageMaker AI</text>
  <text class="body" x="440" y="402">自定义 ML 生命周期</text>
  <text class="tiny" x="440" y="430">训练、调参、部署 endpoint</text>
  <text class="tiny" x="440" y="452">Notebook、Pipeline、MLOps</text>

  <rect class="q" x="406" y="530" width="286" height="104"/>
  <text class="label" x="440" y="570">Amazon Q</text>
  <text class="body" x="440" y="600">成品助手</text>
  <text class="tiny" x="440" y="622">Q Developer / Q Business</text>

  <rect class="data" x="840" y="140" width="300" height="104"/>
  <text class="label" x="874" y="180">Knowledge Base / S3</text>
  <text class="tiny" x="874" y="206">文档、知识库、向量检索</text>
  <path class="line" d="M692 204 L840 192"/>

  <rect class="data" x="840" y="334" width="300" height="104"/>
  <text class="label" x="874" y="374">Training Data</text>
  <text class="tiny" x="874" y="400">你自己的数据和模型训练任务</text>
  <path class="line" d="M692 404 L840 386"/>

  <rect class="data" x="840" y="530" width="300" height="104"/>
  <text class="label" x="874" y="570">Users / Employees</text>
  <text class="tiny" x="874" y="596">直接问答、写代码、查企业知识</text>
  <path class="line" d="M692 582 L840 582"/>

  <rect class="box" x="66" y="364" width="224" height="126"/>
  <text class="label" x="100" y="404">怎么选</text>
  <text class="tiny" x="100" y="430">要调大模型 API：Bedrock</text>
  <text class="tiny" x="100" y="452">要训练/部署模型：SageMaker</text>
  <text class="tiny" x="100" y="474">要现成助手：Amazon Q</text>

  <path class="dash" d="M290 426 L406 404"/>
  <path class="dash" d="M290 470 C352 530 372 560 406 582"/>

  <rect class="note" x="66" y="684" width="1074" height="44"/>
  <text class="noteText" x="98" y="712">一句话：Bedrock 是大模型平台，SageMaker 是自定义 ML 平台，Amazon Q 是 AWS/企业场景里的成品 AI 助手。</text>
</svg>
