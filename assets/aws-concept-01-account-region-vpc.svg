<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">AWS account, Region, Availability Zone, VPC, subnet hierarchy</title>
  <desc id="desc">A visual hierarchy explaining AWS account, Region, Availability Zone, VPC, and subnet.</desc>
  <defs>
    <style>
      .page { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475467; }
      .outer { fill: #ffffff; stroke: #98a2b3; stroke-width: 2.5; rx: 22; }
      .region { fill: #eef4ff; stroke: #175cd3; stroke-width: 2.5; rx: 18; }
      .az { fill: #ecfdf3; stroke: #039855; stroke-width: 2.2; rx: 16; }
      .vpc { fill: #fff7ed; stroke: #f97316; stroke-width: 2.4; rx: 18; }
      .subnetPublic { fill: #eff8ff; stroke: #2e90fa; stroke-width: 2; rx: 12; }
      .subnetPrivate { fill: #fdf2fa; stroke: #c11574; stroke-width: 2; rx: 12; }
      .label { font: 700 22px Arial, sans-serif; fill: #101828; }
      .small { font: 400 16px Arial, sans-serif; fill: #475467; }
      .tiny { font: 400 14px Arial, sans-serif; fill: #667085; }
      .note { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.8; rx: 12; }
      .noteText { font: 700 16px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>
  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 1：AWS 资源的空间层级</text>
  <text class="subtitle" x="52" y="92">先记住包含关系：Account 里面选 Region，Region 里有多个 AZ，VPC 是你的私有网络，Subnet 是 VPC 里的网段。</text>

  <rect class="outer" x="52" y="126" width="1176" height="548"/>
  <text class="label" x="84" y="166">AWS Account</text>
  <text class="small" x="84" y="194">账号：权限边界 + 账单边界 + 资源容器</text>

  <rect class="region" x="118" y="236" width="1044" height="384"/>
  <text class="label" x="150" y="276">Region: eu-central-1 Frankfurt</text>
  <text class="small" x="150" y="304">你选择资源所在的大地理区域。不同 Region 的资源默认彼此独立。</text>

  <rect class="az" x="156" y="346" width="446" height="216"/>
  <text class="label" x="186" y="386">Availability Zone A</text>
  <text class="tiny" x="186" y="414">一个独立机房组</text>

  <rect class="az" x="678" y="346" width="446" height="216"/>
  <text class="label" x="708" y="386">Availability Zone B</text>
  <text class="tiny" x="708" y="414">另一个独立机房组</text>

  <rect class="vpc" x="262" y="440" width="756" height="154"/>
  <text class="label" x="292" y="478">VPC: 10.0.0.0/16</text>
  <text class="small" x="292" y="506">你在 AWS 里的私有网络，跨同一个 Region 内多个 AZ。</text>

  <rect class="subnetPublic" x="298" y="528" width="300" height="48"/>
  <text class="tiny" x="322" y="558">Public subnet: 可以走 Internet Gateway</text>

  <rect class="subnetPrivate" x="682" y="528" width="300" height="48"/>
  <text class="tiny" x="706" y="558">Private subnet: 不直接暴露到公网</text>

  <rect class="note" x="118" y="692" width="1044" height="44"/>
  <text class="noteText" x="150" y="720">一句话：账号管“谁和钱”，Region 管“放哪里”，VPC/Subnet 管“网络怎么隔离”。</text>
</svg>
