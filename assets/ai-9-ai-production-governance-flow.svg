<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-labelledby="title desc">
  <title id="title">AI-9 AWS AI production governance flow</title>
  <desc id="desc">A production AI application is governed through API controls, IAM, Bedrock, logging, metrics, cost controls, audit trails, secrets, encryption, and cleanup runbooks.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; }
      .app { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 10; }
      .ai { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .ops { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 10; }
      .sec { fill: #fdf2f8; stroke: #be185d; stroke-width: 2; rx: 10; }
      .cost { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 10; }
      .label { fill: #0f172a; font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #475569; font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #64748b; font: 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect class="bg" width="1120" height="430" />

  <rect class="box" x="36" y="76" width="146" height="112" />
  <text class="label" x="109" y="116" text-anchor="middle">Client</text>
  <text class="small" x="109" y="144" text-anchor="middle">web / API</text>
  <text class="tiny" x="109" y="166" text-anchor="middle">auth + rate limit</text>

  <rect class="app" x="232" y="76" width="164" height="112" />
  <text class="label" x="314" y="116" text-anchor="middle">Backend</text>
  <text class="small" x="314" y="144" text-anchor="middle">Lambda / service</text>
  <text class="tiny" x="314" y="166" text-anchor="middle">validation + retries</text>

  <rect class="ai" x="446" y="76" width="164" height="112" />
  <text class="label" x="528" y="116" text-anchor="middle">Bedrock</text>
  <text class="small" x="528" y="144" text-anchor="middle">model / KB / agent</text>
  <text class="tiny" x="528" y="166" text-anchor="middle">guardrails optional</text>

  <rect class="app" x="660" y="76" width="164" height="112" />
  <text class="label" x="742" y="116" text-anchor="middle">Data</text>
  <text class="small" x="742" y="144" text-anchor="middle">S3 / DynamoDB</text>
  <text class="tiny" x="742" y="166" text-anchor="middle">least privilege</text>

  <rect class="box" x="874" y="76" width="164" height="112" />
  <text class="label" x="956" y="116" text-anchor="middle">Response</text>
  <text class="small" x="956" y="144" text-anchor="middle">safe output</text>
  <text class="tiny" x="956" y="166" text-anchor="middle">no secrets in logs</text>

  <rect class="ops" x="66" y="276" width="164" height="86" />
  <text class="label" x="148" y="310" text-anchor="middle">CloudWatch</text>
  <text class="small" x="148" y="338" text-anchor="middle">logs / metrics / alarms</text>

  <rect class="cost" x="286" y="276" width="164" height="86" />
  <text class="label" x="368" y="310" text-anchor="middle">Budgets</text>
  <text class="small" x="368" y="338" text-anchor="middle">cost alerts</text>

  <rect class="sec" x="506" y="276" width="164" height="86" />
  <text class="label" x="588" y="310" text-anchor="middle">CloudTrail</text>
  <text class="small" x="588" y="338" text-anchor="middle">audit API calls</text>

  <rect class="sec" x="726" y="276" width="164" height="86" />
  <text class="label" x="808" y="310" text-anchor="middle">Secrets / KMS</text>
  <text class="small" x="808" y="338" text-anchor="middle">protect config and data</text>

  <rect class="ops" x="946" y="276" width="128" height="86" />
  <text class="label" x="1010" y="310" text-anchor="middle">Runbooks</text>
  <text class="small" x="1010" y="338" text-anchor="middle">cleanup / incident</text>

  <path class="arrow" d="M182 132 H224" />
  <path class="arrow" d="M396 132 H438" />
  <path class="arrow" d="M610 132 H652" />
  <path class="arrow" d="M824 132 H866" />
  <path class="soft" d="M314 188 C280 236 214 248 148 276" />
  <path class="soft" d="M528 188 C486 238 430 252 368 276" />
  <path class="soft" d="M528 188 V268" />
  <path class="soft" d="M742 188 C762 232 786 248 808 276" />
  <path class="soft" d="M956 188 C984 232 1000 250 1010 276" />
</svg>
