<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">VPC public and private subnet network model</title>
  <desc id="desc">A diagram explaining Internet Gateway, public subnet, private subnet, NAT Gateway, route tables, security groups, and database isolation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .page { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475467; }
      .vpc { fill: #fff7ed; stroke: #f97316; stroke-width: 3; rx: 22; }
      .public { fill: #eff8ff; stroke: #2e90fa; stroke-width: 2.4; rx: 16; }
      .private { fill: #fdf2fa; stroke: #c11574; stroke-width: 2.4; rx: 16; }
      .box { fill: #ffffff; stroke: #d0d5dd; stroke-width: 2; rx: 13; }
      .good { fill: #ecfdf3; stroke: #039855; stroke-width: 2; rx: 13; }
      .label { font: 700 22px Arial, sans-serif; fill: #101828; }
      .body { font: 400 16px Arial, sans-serif; fill: #475467; }
      .tiny { font: 400 14px Arial, sans-serif; fill: #667085; }
      .line { stroke: #344054; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #667085; stroke-width: 2.3; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.8; rx: 12; }
      .noteText { font: 700 16px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>
  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 3：VPC 里的公有子网和私有子网</text>
  <text class="subtitle" x="52" y="92">公网入口通常放 public subnet；真正的应用和数据库尽量放 private subnet。</text>

  <rect class="box" x="64" y="170" width="184" height="86"/>
  <text class="label" x="98" y="208">Internet</text>
  <text class="tiny" x="98" y="236">用户和公网</text>

  <rect class="vpc" x="304" y="132" width="884" height="496"/>
  <text class="label" x="338" y="172">VPC: 10.0.0.0/16</text>
  <text class="body" x="338" y="200">你的私有网络边界</text>

  <rect class="good" x="340" y="248" width="180" height="86"/>
  <text class="label" x="368" y="286">IGW</text>
  <text class="tiny" x="368" y="314">Internet Gateway</text>
  <path class="line" d="M248 214 C282 214 300 252 340 286"/>

  <rect class="public" x="558" y="248" width="258" height="254"/>
  <text class="label" x="590" y="286">Public Subnet</text>
  <text class="tiny" x="590" y="314">路由表有 0.0.0.0/0 -> IGW</text>
  <rect class="box" x="590" y="350" width="194" height="62"/>
  <text class="body" x="616" y="388">ALB / Bastion</text>
  <rect class="box" x="590" y="430" width="194" height="46"/>
  <text class="tiny" x="616" y="459">NAT Gateway</text>
  <path class="line" d="M520 290 L558 290"/>

  <rect class="private" x="878" y="248" width="258" height="254"/>
  <text class="label" x="910" y="286">Private Subnet</text>
  <text class="tiny" x="910" y="314">没有直接到 IGW 的入站路径</text>
  <rect class="box" x="910" y="350" width="194" height="62"/>
  <text class="body" x="936" y="388">EC2 / ECS Tasks</text>
  <rect class="box" x="910" y="430" width="194" height="46"/>
  <text class="tiny" x="936" y="459">RDS Database</text>
  <path class="line" d="M784 382 L910 382"/>

  <path class="dash" d="M910 452 C846 508 730 506 687 476"/>
  <text class="tiny" x="724" y="532">私有资源出网更新软件：Private -> NAT Gateway -> IGW -> Internet</text>

  <rect class="box" x="360" y="540" width="350" height="54"/>
  <text class="body" x="388" y="574">Route Table 决定流量下一跳</text>
  <rect class="box" x="758" y="540" width="350" height="54"/>
  <text class="body" x="786" y="574">Security Group 决定端口能否进出</text>

  <rect class="note" x="64" y="684" width="1124" height="44"/>
  <text class="noteText" x="96" y="712">一句话：Public subnet 面向入口，Private subnet 放核心资源；Route Table 管路，Security Group 管门。</text>
</svg>
