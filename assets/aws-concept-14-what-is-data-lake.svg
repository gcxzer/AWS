<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">What is a data lake</title>
  <desc id="desc">A simple Chinese diagram explaining that a data lake is an S3-based central place for raw and cleaned data, queried by Glue, Athena, QuickSight, Redshift, and SageMaker.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .page { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475467; }
      .source { fill: #ffffff; stroke: #d0d5dd; stroke-width: 2; rx: 14; }
      .lake { fill: #eff8ff; stroke: #2e90fa; stroke-width: 3; rx: 24; }
      .raw { fill: #fff7ed; stroke: #f97316; stroke-width: 2.4; rx: 14; }
      .clean { fill: #ecfdf3; stroke: #039855; stroke-width: 2.4; rx: 14; }
      .tool { fill: #f4f3ff; stroke: #7a5af8; stroke-width: 2.4; rx: 14; }
      .output { fill: #fdf2fa; stroke: #c11574; stroke-width: 2.4; rx: 14; }
      .label { font: 700 22px Arial, sans-serif; fill: #101828; }
      .body { font: 400 16px Arial, sans-serif; fill: #475467; }
      .tiny { font: 400 14px Arial, sans-serif; fill: #667085; }
      .line { stroke: #344054; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #667085; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.8; rx: 12; }
      .noteText { font: 700 16px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>

  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 14：数据湖到底是什么</text>
  <text class="subtitle" x="52" y="92">不要先想复杂产品。先记住：数据湖就是把很多来源的数据集中放到 S3，再慢慢整理和分析。</text>

  <rect class="source" x="58" y="152" width="220" height="74"/>
  <text class="label" x="88" y="190">应用日志</text>
  <text class="tiny" x="88" y="214">访问、报错、运行记录</text>

  <rect class="source" x="58" y="264" width="220" height="74"/>
  <text class="label" x="88" y="302">业务数据库</text>
  <text class="tiny" x="88" y="326">RDS 订单、用户、交易</text>

  <rect class="source" x="58" y="376" width="220" height="74"/>
  <text class="label" x="88" y="414">用户行为</text>
  <text class="tiny" x="88" y="438">点击、浏览、搜索事件</text>

  <rect class="source" x="58" y="488" width="220" height="74"/>
  <text class="label" x="88" y="526">文件和 AI 结果</text>
  <text class="tiny" x="88" y="550">CSV、JSON、图片、向量</text>

  <rect class="lake" x="386" y="142" width="414" height="440"/>
  <text class="label" x="424" y="184">Data Lake on S3</text>
  <text class="body" x="424" y="214">湖底通常就是 S3 bucket</text>

  <rect class="raw" x="428" y="268" width="330" height="112"/>
  <text class="label" x="462" y="308">Raw Zone</text>
  <text class="body" x="462" y="338">原始数据先倒进来</text>
  <text class="tiny" x="462" y="362">CSV / JSON / logs / images / exports</text>

  <rect class="clean" x="428" y="424" width="330" height="112"/>
  <text class="label" x="462" y="464">Curated Zone</text>
  <text class="body" x="462" y="494">清洗、转换、分区后的数据</text>
  <text class="tiny" x="462" y="518">Parquet / partition / daily tables</text>

  <path class="line" d="M278 188 C332 188 348 270 428 310"/>
  <path class="line" d="M278 300 C332 300 356 316 428 326"/>
  <path class="line" d="M278 412 C332 412 356 350 428 342"/>
  <path class="line" d="M278 524 C340 524 358 492 428 486"/>
  <path class="line" d="M592 380 L592 424"/>

  <rect class="tool" x="894" y="148" width="286" height="86"/>
  <text class="label" x="928" y="186">Glue Catalog</text>
  <text class="tiny" x="928" y="214">告诉工具：S3 文件有什么字段</text>
  <path class="dash" d="M800 300 C842 250 858 204 894 190"/>

  <rect class="tool" x="894" y="274" width="286" height="86"/>
  <text class="label" x="928" y="312">Athena</text>
  <text class="tiny" x="928" y="340">用 SQL 查询 S3 文件</text>
  <path class="line" d="M800 344 L894 318"/>

  <rect class="output" x="894" y="400" width="286" height="86"/>
  <text class="label" x="928" y="438">QuickSight / BI</text>
  <text class="tiny" x="928" y="466">做报表、dashboard、指标图</text>
  <path class="line" d="M1036 360 L1036 400"/>

  <rect class="output" x="894" y="526" width="286" height="86"/>
  <text class="label" x="928" y="564">Redshift / SageMaker</text>
  <text class="tiny" x="928" y="592">数仓分析或机器学习训练</text>
  <path class="line" d="M800 502 L894 568"/>

  <rect class="note" x="58" y="682" width="1122" height="44"/>
  <text class="noteText" x="90" y="710">一句话：RDS 是业务正在用的数据库；数据湖是把历史数据、日志、文件、事件集中到 S3，给分析和 AI 用。</text>
</svg>
