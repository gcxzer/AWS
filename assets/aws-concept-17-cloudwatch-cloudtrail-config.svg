<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">CloudWatch CloudTrail Config comparison</title>
  <desc id="desc">A Chinese diagram comparing CloudWatch, CloudTrail, and AWS Config.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .page { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475467; }
      .box { fill: #ffffff; stroke: #d0d5dd; stroke-width: 2; rx: 14; }
      .watch { fill: #eef4ff; stroke: #175cd3; stroke-width: 2.6; rx: 18; }
      .trail { fill: #fff7ed; stroke: #f97316; stroke-width: 2.6; rx: 18; }
      .config { fill: #ecfdf3; stroke: #039855; stroke-width: 2.6; rx: 18; }
      .label { font: 700 22px Arial, sans-serif; fill: #101828; }
      .body { font: 400 16px Arial, sans-serif; fill: #475467; }
      .tiny { font: 400 14px Arial, sans-serif; fill: #667085; }
      .q { font: 700 18px Arial, sans-serif; fill: #344054; }
      .line { stroke: #344054; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.8; rx: 12; }
      .noteText { font: 700 16px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>
  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 16：CloudWatch、CloudTrail、Config 不要混</text>
  <text class="subtitle" x="52" y="92">这三个都像“记录”，但记录的对象完全不同：运行状态、账号操作、资源配置。</text>

  <rect class="box" x="78" y="150" width="230" height="92"/>
  <text class="label" x="112" y="190">应用和资源</text>
  <text class="tiny" x="112" y="216">EC2 / Lambda / ECS / RDS</text>

  <rect class="box" x="78" y="334" width="230" height="92"/>
  <text class="label" x="112" y="374">AWS API 操作</text>
  <text class="tiny" x="112" y="400">创建、删除、修改、登录</text>

  <rect class="box" x="78" y="518" width="230" height="92"/>
  <text class="label" x="112" y="558">资源配置状态</text>
  <text class="tiny" x="112" y="584">安全组、S3、RDS 设置</text>

  <rect class="watch" x="420" y="128" width="350" height="132"/>
  <text class="label" x="456" y="172">CloudWatch</text>
  <text class="q" x="456" y="204">系统现在跑得怎么样？</text>
  <text class="tiny" x="456" y="232">metrics / logs / alarms / dashboard</text>
  <path class="line" d="M308 196 L420 196"/>

  <rect class="trail" x="420" y="312" width="350" height="132"/>
  <text class="label" x="456" y="356">CloudTrail</text>
  <text class="q" x="456" y="388">谁在什么时候做了什么？</text>
  <text class="tiny" x="456" y="416">API audit events / management events</text>
  <path class="line" d="M308 380 L420 380"/>

  <rect class="config" x="420" y="496" width="350" height="132"/>
  <text class="label" x="456" y="540">AWS Config</text>
  <text class="q" x="456" y="572">资源配置变成了什么？</text>
  <text class="tiny" x="456" y="600">configuration history / rules / compliance</text>
  <path class="line" d="M308 564 L420 564"/>

  <rect class="box" x="888" y="150" width="304" height="92"/>
  <text class="label" x="922" y="190">告警和排障</text>
  <text class="tiny" x="922" y="216">CPU 高、日志报错、延迟变慢</text>
  <path class="line" d="M770 196 L888 196"/>

  <rect class="box" x="888" y="334" width="304" height="92"/>
  <text class="label" x="922" y="374">审计和安全调查</text>
  <text class="tiny" x="922" y="400">谁删了 bucket，谁改了权限</text>
  <path class="line" d="M770 380 L888 380"/>

  <rect class="box" x="888" y="518" width="304" height="92"/>
  <text class="label" x="922" y="558">合规和配置时间线</text>
  <text class="tiny" x="922" y="584">是否违反规则，配置何时变化</text>
  <path class="line" d="M770 564 L888 564"/>

  <rect class="note" x="78" y="684" width="1114" height="44"/>
  <text class="noteText" x="110" y="712">一句话：CloudWatch 看运行，CloudTrail 看操作，Config 看配置。排障、安全审计、合规检查分别找不同入口。</text>
</svg>
