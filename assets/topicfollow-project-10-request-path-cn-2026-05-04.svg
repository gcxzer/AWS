<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1040" viewBox="0 0 1700 1040" role="img" aria-labelledby="title desc">
  <title id="title">TopicFollow AWS 请求路径</title>
  <desc id="desc">展示用户请求从 Cloudflare 到 ALB、Listener、Target Group、ECS task，再到 RDS、S3 和外部 API 的路径。</desc>
  <defs>
    <marker id="arrow" markerWidth="13" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,0 L13,5 L0,10 Z" fill="#243044"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 34px Arial,"Noto Sans SC",sans-serif;fill:#0f172a}
      .subtitle{font:18px Arial,"Noto Sans SC",sans-serif;fill:#334155}
      .zone{fill:#fff;stroke:#cbd5e1;stroke-width:2.2}
      .edge{fill:#fdf2f8;stroke:#db2777;stroke-width:3}
      .public{fill:#fff7ed;stroke:#f97316;stroke-width:3}
      .app{fill:#ecfeff;stroke:#0891b2;stroke-width:3}
      .data{fill:#f0fdf4;stroke:#16a34a;stroke-width:3}
      .config{fill:#fefce8;stroke:#ca8a04;stroke-width:3}
      .h{font:700 22px Arial,"Noto Sans SC",sans-serif;fill:#0f172a}
      .h2{font:700 17px Arial,"Noto Sans SC",sans-serif;fill:#0f172a}
      .t{font:16px Arial,"Noto Sans SC",sans-serif;fill:#334155}
      .s{font:14px Arial,"Noto Sans SC",sans-serif;fill:#475569}
      .m{font:13px Consolas,"SFMono-Regular",monospace;fill:#1e293b}
      .arrow{stroke:#243044;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .soft{stroke:#64748b;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .dash{stroke-dasharray:8 7}
      .num{fill:#0f172a}.numText{font:700 13px Arial,sans-serif;fill:#fff}
    </style>
  </defs>
  <rect class="bg" width="1700" height="1040"/>
  <text class="title" x="52" y="62">运行时请求路径：用户的一次访问穿过哪些 AWS 组件</text>
  <text class="subtitle" x="52" y="96">这张图只看“网页请求怎么进来”。虚线是应用运行中额外访问的数据、文件和外部服务。</text>

  <rect class="edge" x="52" y="170" width="260" height="640" rx="22"/>
  <text class="h" x="84" y="212">AWS 外部</text>
  <rect class="zone" x="84" y="270" width="196" height="82" rx="12"/>
  <text class="h2" x="108" y="302">Browser</text>
  <text class="s" x="108" y="328">打开 topicfollow.com</text>
  <rect class="zone" x="84" y="455" width="196" height="100" rx="12"/>
  <text class="h2" x="108" y="488">Cloudflare</text>
  <text class="s" x="108" y="514">DNS / Proxy</text>
  <text class="m" x="108" y="538">CNAME -&gt; ALB</text>

  <rect class="public" x="390" y="170" width="430" height="640" rx="22"/>
  <text class="h" x="422" y="212">Public subnets</text>
  <rect class="zone" x="422" y="270" width="330" height="90" rx="12"/>
  <text class="h2" x="450" y="304">ALB</text>
  <text class="m" x="450" y="332">topicfollow-prod-alb</text>
  <rect class="zone" x="422" y="425" width="330" height="130" rx="12"/>
  <text class="h2" x="450" y="458">Listener rules</text>
  <text class="m" x="450" y="486">:80  -&gt; redirect to :443</text>
  <text class="m" x="450" y="512">:443 -&gt; forward to TG</text>
  <rect class="zone" x="422" y="620" width="330" height="120" rx="12"/>
  <text class="h2" x="450" y="653">Target Group / Zielgruppe</text>
  <text class="m" x="450" y="681">topicfollow-prod-web-tg</text>
  <text class="s" x="450" y="707">健康检查 /api/health</text>

  <rect class="app" x="890" y="170" width="360" height="640" rx="22"/>
  <text class="h" x="922" y="212">Private app subnets</text>
  <rect class="zone" x="922" y="285" width="280" height="120" rx="12"/>
  <text class="h2" x="950" y="318">ECS task target</text>
  <text class="m" x="950" y="346">10.20.x.x:3000</text>
  <text class="s" x="950" y="374">健康时才接收请求</text>
  <rect class="zone" x="922" y="485" width="280" height="120" rx="12"/>
  <text class="h2" x="950" y="518">TopicFollow container</text>
  <text class="m" x="950" y="546">topicfollow-web</text>
  <text class="s" x="950" y="574">Next.js app process</text>

  <rect class="data" x="1330" y="170" width="318" height="640" rx="22"/>
  <text class="h" x="1362" y="212">应用会访问的资源</text>
  <rect class="zone" x="1362" y="270" width="235" height="82" rx="12"/>
  <text class="h2" x="1386" y="302">RDS PostgreSQL</text>
  <text class="m" x="1386" y="328">private :5432</text>
  <rect class="zone" x="1362" y="405" width="235" height="82" rx="12"/>
  <text class="h2" x="1386" y="437">S3 uploads</text>
  <text class="s" x="1386" y="463">读写上传文件</text>
  <rect class="zone" x="1362" y="540" width="235" height="82" rx="12"/>
  <text class="h2" x="1386" y="572">External APIs</text>
  <text class="s" x="1386" y="598">经 NAT Gateway 出网</text>
  <rect class="config" x="1362" y="675" width="235" height="82" rx="12"/>
  <text class="h2" x="1386" y="707">CloudWatch Logs</text>
  <text class="s" x="1386" y="733">记录应用日志</text>

  <path class="arrow" d="M182 352 L182 455"/>
  <path class="arrow" d="M280 505 C335 505 360 315 422 315"/>
  <path class="arrow" d="M587 360 L587 425"/>
  <path class="arrow" d="M587 555 L587 620"/>
  <path class="arrow" d="M752 680 C825 680 850 345 922 345"/>
  <path class="arrow" d="M1062 405 L1062 485"/>
  <path class="soft dash" d="M1202 540 C1270 490 1295 312 1362 312"/>
  <path class="soft dash" d="M1202 552 C1275 545 1295 447 1362 447"/>
  <path class="soft dash" d="M1202 565 C1275 585 1290 582 1362 582"/>
  <path class="soft dash" d="M1202 578 C1275 690 1290 716 1362 716"/>

  <circle class="num" cx="182" cy="255" r="15"/><text class="numText" x="178" y="260">1</text>
  <circle class="num" cx="182" cy="440" r="15"/><text class="numText" x="178" y="445">2</text>
  <circle class="num" cx="422" cy="300" r="15"/><text class="numText" x="418" y="305">3</text>
  <circle class="num" cx="422" cy="410" r="15"/><text class="numText" x="418" y="415">4</text>
  <circle class="num" cx="422" cy="605" r="15"/><text class="numText" x="418" y="610">5</text>
  <circle class="num" cx="922" cy="270" r="15"/><text class="numText" x="918" y="275">6</text>

  <rect class="zone" x="52" y="875" width="1596" height="95" rx="16"/>
  <text class="h2" x="84" y="912">这条链路里最重要的连接</text>
  <text class="t" x="84" y="942">ALB 不直接知道“service 是什么”。ALB 只 forward 到 target group；ECS service 在后台把健康 task 的 IP:3000 注册进 target group。</text>
</svg>
