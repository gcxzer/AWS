<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">RDS in VPC model</title>
  <desc id="desc">A Chinese diagram explaining RDS placement in private subnets, DB subnet group, security groups, Multi-AZ standby, backups, and read replicas.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .page { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475467; }
      .vpc { fill: #fff7ed; stroke: #f97316; stroke-width: 3; rx: 22; }
      .subnet { fill: #eef4ff; stroke: #175cd3; stroke-width: 2.4; rx: 16; }
      .private { fill: #fdf2fa; stroke: #c11574; stroke-width: 2.4; rx: 16; }
      .db { fill: #ecfdf3; stroke: #039855; stroke-width: 2.6; rx: 16; }
      .box { fill: #ffffff; stroke: #d0d5dd; stroke-width: 2; rx: 14; }
      .ops { fill: #f4f3ff; stroke: #7a5af8; stroke-width: 2.4; rx: 14; }
      .label { font: 700 21px Arial, sans-serif; fill: #101828; }
      .body { font: 400 15.5px Arial, sans-serif; fill: #475467; }
      .tiny { font: 400 13.5px Arial, sans-serif; fill: #667085; }
      .line { stroke: #344054; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #667085; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.8; rx: 12; }
      .noteText { font: 700 16px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>
  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 18：RDS 应该放在 VPC 里的哪里</text>
  <text class="subtitle" x="52" y="92">生产里数据库通常不直接暴露公网，而是放在 private subnets，只允许应用层访问。</text>

  <rect class="vpc" x="56" y="132" width="1168" height="498"/>
  <text class="label" x="90" y="172">VPC</text>
  <text class="body" x="90" y="200">应用和数据库都在这个私有网络里</text>

  <rect class="subnet" x="118" y="256" width="246" height="126"/>
  <text class="label" x="150" y="296">Public Subnet</text>
  <text class="tiny" x="150" y="324">ALB / NAT Gateway</text>
  <text class="tiny" x="150" y="348">面向公网入口</text>

  <rect class="private" x="438" y="236" width="300" height="288"/>
  <text class="label" x="470" y="276">Private Subnet A</text>
  <text class="tiny" x="470" y="304">AZ A</text>
  <rect class="box" x="480" y="340" width="216" height="70"/>
  <text class="label" x="512" y="380">App / ECS</text>
  <text class="tiny" x="512" y="402">应用服务</text>
  <rect class="db" x="480" y="434" width="216" height="70"/>
  <text class="label" x="512" y="474">RDS Primary</text>
  <text class="tiny" x="512" y="496">主库</text>

  <rect class="private" x="816" y="236" width="300" height="288"/>
  <text class="label" x="848" y="276">Private Subnet B</text>
  <text class="tiny" x="848" y="304">AZ B</text>
  <rect class="db" x="858" y="434" width="216" height="70"/>
  <text class="label" x="890" y="474">Standby</text>
  <text class="tiny" x="890" y="496">Multi-AZ 故障接管</text>

  <path class="line" d="M364 320 L480 374"/>
  <path class="line" d="M588 410 L588 434"/>
  <path class="dash" d="M696 470 L858 470"/>
  <text class="tiny" x="708" y="454">同步复制 / failover</text>

  <rect class="box" x="120" y="436" width="244" height="92"/>
  <text class="label" x="152" y="474">Security Group</text>
  <text class="tiny" x="152" y="500">DB 只允许 App SG 访问</text>

  <rect class="ops" x="438" y="556" width="242" height="58"/>
  <text class="label" x="470" y="594">Automated Backup</text>

  <rect class="ops" x="748" y="556" width="242" height="58"/>
  <text class="label" x="780" y="594">Read Replica</text>

  <path class="dash" d="M588 504 L558 556"/>
  <path class="dash" d="M642 504 C720 532 742 552 780 556"/>

  <rect class="box" x="848" y="144" width="268" height="74"/>
  <text class="label" x="880" y="182">DB Subnet Group</text>
  <text class="tiny" x="880" y="206">告诉 RDS 可以放在哪些子网</text>

  <path class="dash" d="M946 218 L966 236"/>
  <path class="dash" d="M946 218 C800 226 678 226 588 236"/>

  <rect class="note" x="56" y="684" width="1168" height="44"/>
  <text class="noteText" x="88" y="712">一句话：RDS 放 private subnet，用 DB subnet group 跨 AZ，安全组只放行应用层，备份和 Multi-AZ 解决恢复与高可用。</text>
</svg>
