<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">AWS 存储、数据库和数据湖模型</title>
  <desc id="desc">比较 S3, EBS, EFS, RDS, DynamoDB, ElastiCache 和数据湖的用途。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/></marker>
    <style>
      .page{fill:#f8fafc}
      .title{font:700 36px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0f172a}
      .sub{font:400 18px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#475569}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}
      .obj{fill:#eff6ff;stroke:#2563eb;stroke-width:2.3;rx:18}
      .fs{fill:#ecfdf5;stroke:#16a34a;stroke-width:2.3;rx:18}
      .db{fill:#fefce8;stroke:#ca8a04;stroke-width:2.3;rx:18}
      .cache{fill:#fff7ed;stroke:#f97316;stroke-width:2.3;rx:18}
      .lake{fill:#f0fdfa;stroke:#0f766e;stroke-width:2.3;rx:18}
      .h{font:700 23px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0f172a}
      .t{font:400 16px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#475569}
      .s{font:400 14px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#64748b}
      .line{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#64748b;stroke-width:2.3;stroke-dasharray:7 8;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="page" width="1600" height="980"/>
  <text class="title" x="58" y="66">数据怎么选：先问你存的是文件、磁盘、表、缓存，还是分析数据</text>
  <text class="sub" x="58" y="102">S3 不是磁盘，RDS 不是文件夹，缓存不是唯一真数据源；数据湖通常是 S3 加目录、Catalog 和查询层。</text>

  <rect class="obj" x="80" y="160" width="300" height="180"/>
  <text class="h" x="115" y="206">S3</text>
  <text class="t" x="115" y="238">对象存储</text>
  <text class="s" x="115" y="274">图片、上传文件、日志、备份</text>
  <text class="s" x="115" y="300">按 key 读写对象</text>
  <text class="s" x="115" y="326">不是普通磁盘</text>

  <rect class="fs" x="460" y="160" width="300" height="180"/>
  <text class="h" x="495" y="206">EBS / EFS</text>
  <text class="t" x="495" y="238">块存储 / 文件系统</text>
  <text class="s" x="495" y="274">EBS：一台 EC2 的云硬盘</text>
  <text class="s" x="495" y="300">EFS：多实例共享目录</text>
  <text class="s" x="495" y="326">成本和延迟不同于 S3</text>

  <rect class="db" x="840" y="160" width="300" height="180"/>
  <text class="h" x="875" y="206">RDS / DynamoDB</text>
  <text class="t" x="875" y="238">数据库</text>
  <text class="s" x="875" y="274">RDS：SQL、事务、关系表</text>
  <text class="s" x="875" y="300">DynamoDB：高并发 key-value</text>
  <text class="s" x="875" y="326">先按查询模式设计</text>

  <rect class="cache" x="1220" y="160" width="300" height="180"/>
  <text class="h" x="1255" y="206">ElastiCache</text>
  <text class="t" x="1255" y="238">缓存层</text>
  <text class="s" x="1255" y="274">Redis / Memcached</text>
  <text class="s" x="1255" y="300">加速热点数据</text>
  <text class="s" x="1255" y="326">不是唯一真数据源</text>

  <text class="h" x="80" y="445">数据湖不是一个服务名，是一套组织方式</text>
  <rect class="lake" x="80" y="485" width="300" height="150"/>
  <text class="h" x="115" y="530">Raw Zone</text>
  <text class="s" x="115" y="562">原始文件先存 S3</text>
  <text class="s" x="115" y="588">不要急着覆盖或改坏</text>

  <rect class="lake" x="460" y="485" width="300" height="150"/>
  <text class="h" x="495" y="530">Curated Zone</text>
  <text class="s" x="495" y="562">清洗、分区、转 Parquet</text>
  <text class="s" x="495" y="588">给分析和 AI 用</text>

  <rect class="lake" x="840" y="485" width="300" height="150"/>
  <text class="h" x="875" y="530">Glue Catalog</text>
  <text class="s" x="875" y="562">记录表结构和 metadata</text>
  <text class="s" x="875" y="588">让文件像表一样可查</text>

  <rect class="lake" x="1220" y="485" width="300" height="150"/>
  <text class="h" x="1255" y="530">Athena / Redshift</text>
  <text class="s" x="1255" y="562">SQL 查询和数仓分析</text>
  <text class="s" x="1255" y="588">QuickSight / SageMaker 在上层用</text>

  <path class="line" d="M380 560 H460"/>
  <path class="line" d="M760 560 H840"/>
  <path class="line" d="M1140 560 H1220"/>

  <rect class="box" x="120" y="740" width="1360" height="110"/>
  <text class="h" x="155" y="784">选择口诀</text>
  <text class="t" x="155" y="818">文件和图片：S3；服务器磁盘：EBS；共享目录：EFS；关系数据：RDS；超高并发键值：DynamoDB；热点加速：ElastiCache；分析和 AI：S3 数据湖。</text>
</svg>
