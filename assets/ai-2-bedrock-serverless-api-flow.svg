<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="360" viewBox="0 0 1080 360" role="img" aria-labelledby="title desc">
  <title id="title">AI-2 Bedrock Serverless API flow</title>
  <desc id="desc">Client sends an HTTP request to API Gateway, API Gateway invokes Lambda, Lambda uses an execution role to call Bedrock Runtime, and Lambda writes logs to CloudWatch.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; }
      .guard { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .logs { fill: #fefce8; stroke: #a16207; stroke-width: 2; rx: 10; }
      .label { fill: #0f172a; font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #475569; font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #64748b; font: 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect class="bg" width="1080" height="360" />

  <rect class="box" x="36" y="96" width="150" height="104" />
  <text class="label" x="111" y="135" text-anchor="middle">Client</text>
  <text class="small" x="111" y="162" text-anchor="middle">curl / browser</text>
  <text class="tiny" x="111" y="184" text-anchor="middle">POST /summarize</text>

  <rect class="box" x="246" y="86" width="170" height="124" />
  <text class="label" x="331" y="126" text-anchor="middle">API Gateway</text>
  <text class="small" x="331" y="154" text-anchor="middle">HTTP API</text>
  <text class="tiny" x="331" y="176" text-anchor="middle">public endpoint</text>
  <text class="tiny" x="331" y="194" text-anchor="middle">route to Lambda</text>

  <rect class="guard" x="476" y="86" width="180" height="124" />
  <text class="label" x="566" y="126" text-anchor="middle">Lambda</text>
  <text class="small" x="566" y="154" text-anchor="middle">validate input</text>
  <text class="tiny" x="566" y="176" text-anchor="middle">choose model</text>
  <text class="tiny" x="566" y="194" text-anchor="middle">return JSON</text>

  <rect class="box" x="726" y="86" width="170" height="124" />
  <text class="label" x="811" y="126" text-anchor="middle">Bedrock</text>
  <text class="small" x="811" y="154" text-anchor="middle">Runtime</text>
  <text class="tiny" x="811" y="176" text-anchor="middle">Converse API</text>
  <text class="tiny" x="811" y="194" text-anchor="middle">model inference</text>

  <rect class="guard" x="476" y="250" width="180" height="72" />
  <text class="label" x="566" y="279" text-anchor="middle">Execution role</text>
  <text class="small" x="566" y="303" text-anchor="middle">logs + Bedrock invoke</text>

  <rect class="logs" x="726" y="250" width="170" height="72" />
  <text class="label" x="811" y="279" text-anchor="middle">CloudWatch</text>
  <text class="small" x="811" y="303" text-anchor="middle">logs and errors</text>

  <rect class="box" x="946" y="96" width="98" height="104" />
  <text class="label" x="995" y="135" text-anchor="middle">JSON</text>
  <text class="small" x="995" y="162" text-anchor="middle">summary</text>
  <text class="tiny" x="995" y="184" text-anchor="middle">tokens, latency</text>

  <path class="arrow" d="M186 148 H238" />
  <path class="arrow" d="M416 148 H468" />
  <path class="arrow" d="M656 148 H718" />
  <path class="arrow" d="M896 148 H938" />
  <path class="soft" d="M566 210 V242" />
  <path class="soft" d="M626 210 C670 232 720 246 770 258" />
  <path class="soft" d="M566 250 V218" />
</svg>
