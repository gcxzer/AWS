<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">AWS 可靠性和恢复流程</title>
  <desc id="desc">展示健康检查、Auto Scaling、Multi-AZ、备份、恢复演练和 RTO/RPO 的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/></marker>
    <style>
      .page{fill:#f8fafc}.title{font:700 36px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0f172a}.sub{font:400 18px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#475569}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}.live{fill:#ecfdf5;stroke:#16a34a;stroke-width:2.3;rx:18}.warn{fill:#fff7ed;stroke:#f97316;stroke-width:2.3;rx:18}.backup{fill:#eff6ff;stroke:#2563eb;stroke-width:2.3;rx:18}.dr{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2.3;rx:18}
      .h{font:700 22px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0f172a}.t{font:400 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#475569}.s{font:400 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#64748b}.line{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#64748b;stroke-width:2.3;stroke-dasharray:7 8;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="page" width="1600" height="980"/>
  <text class="title" x="58" y="66">可靠性不是“有备份就行”，还要健康检查、切换、恢复演练</text>
  <text class="sub" x="58" y="102">Multi-AZ 解决高可用，Backup/Snapshot 解决恢复；RTO/RPO 是判断方案够不够用的目标。</text>

  <rect class="live" x="80" y="180" width="260" height="135"/><text class="h" x="115" y="225">健康检查</text><text class="t" x="115" y="258">ALB / ECS / Route 53</text><text class="s" x="115" y="286">坏实例不接流量</text>
  <rect class="live" x="430" y="180" width="260" height="135"/><text class="h" x="465" y="225">Auto Scaling</text><text class="t" x="465" y="258">按指标增减容量</text><text class="s" x="465" y="286">CPU、请求数、队列长度</text>
  <rect class="live" x="780" y="180" width="260" height="135"/><text class="h" x="815" y="225">Multi-AZ</text><text class="t" x="815" y="258">同 Region 多 AZ</text><text class="s" x="815" y="286">单 AZ 故障时切换</text>
  <rect class="warn" x="1130" y="180" width="260" height="135"/><text class="h" x="1165" y="225">告警</text><text class="t" x="1165" y="258">CloudWatch Alarm</text><text class="s" x="1165" y="286">先知道坏了，才能处理</text>
  <path class="line" d="M340 248 H430"/><path class="line" d="M690 248 H780"/><path class="line" d="M1040 248 H1130"/>

  <rect class="backup" x="150" y="480" width="300" height="150"/><text class="h" x="185" y="526">备份</text><text class="t" x="185" y="560">Snapshot / AWS Backup</text><text class="s" x="185" y="590">保存可恢复的时间点</text>
  <rect class="backup" x="560" y="480" width="300" height="150"/><text class="h" x="595" y="526">恢复演练</text><text class="t" x="595" y="560">Restore drill</text><text class="s" x="595" y="590">验证备份真的能用</text>
  <rect class="dr" x="970" y="480" width="300" height="150"/><text class="h" x="1005" y="526">跨区域灾备</text><text class="t" x="1005" y="560">Cross-Region</text><text class="s" x="1005" y="590">应对 Region 级风险</text>
  <path class="line" d="M450 555 H560"/><path class="line" d="M860 555 H970"/>

  <rect class="box" x="160" y="750" width="560" height="110"/><text class="h" x="195" y="792">RTO</text><text class="t" x="195" y="826">Recovery Time Objective：多久恢复服务。</text>
  <rect class="box" x="880" y="750" width="560" height="110"/><text class="h" x="915" y="792">RPO</text><text class="t" x="915" y="826">Recovery Point Objective：最多能接受丢多少数据。</text>
</svg>
