<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="390" viewBox="0 0 1120 390" role="img" aria-labelledby="title desc">
  <title id="title">AI-5 Bedrock Agent Lambda tool flow</title>
  <desc id="desc">A user invokes a Bedrock Agent alias. The agent uses its orchestration model and action schema to call a Lambda tool, which reads lesson data and returns a structured result for the agent final answer.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; }
      .ai { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .tool { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 10; }
      .store { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 10; }
      .guard { fill: #fdf2f8; stroke: #be185d; stroke-width: 2; rx: 10; }
      .label { fill: #0f172a; font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #475569; font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #64748b; font: 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect class="bg" width="1120" height="390" />

  <rect class="box" x="38" y="142" width="130" height="106" />
  <text class="label" x="103" y="182" text-anchor="middle">User</text>
  <text class="small" x="103" y="210" text-anchor="middle">lesson question</text>

  <rect class="ai" x="218" y="96" width="158" height="106" />
  <text class="label" x="297" y="136" text-anchor="middle">Agent alias</text>
  <text class="small" x="297" y="164" text-anchor="middle">runtime target</text>
  <text class="tiny" x="297" y="184" text-anchor="middle">version boundary</text>

  <rect class="ai" x="426" y="96" width="178" height="106" />
  <text class="label" x="515" y="136" text-anchor="middle">Agent</text>
  <text class="small" x="515" y="164" text-anchor="middle">orchestration</text>
  <text class="tiny" x="515" y="184" text-anchor="middle">chooses a tool</text>

  <rect class="tool" x="654" y="96" width="178" height="106" />
  <text class="label" x="743" y="136" text-anchor="middle">Action group</text>
  <text class="small" x="743" y="164" text-anchor="middle">OpenAPI schema</text>
  <text class="tiny" x="743" y="184" text-anchor="middle">get_lesson_summary</text>

  <rect class="tool" x="882" y="96" width="158" height="106" />
  <text class="label" x="961" y="136" text-anchor="middle">Lambda tool</text>
  <text class="small" x="961" y="164" text-anchor="middle">business logic</text>
  <text class="tiny" x="961" y="184" text-anchor="middle">returns JSON</text>

  <rect class="guard" x="218" y="258" width="158" height="80" />
  <text class="label" x="297" y="290" text-anchor="middle">IAM policy</text>
  <text class="small" x="297" y="316" text-anchor="middle">agent model access</text>

  <rect class="guard" x="426" y="258" width="178" height="80" />
  <text class="label" x="515" y="290" text-anchor="middle">Lambda policy</text>
  <text class="small" x="515" y="316" text-anchor="middle">allow Bedrock invoke</text>

  <rect class="store" x="882" y="258" width="158" height="80" />
  <text class="label" x="961" y="290" text-anchor="middle">Lesson data</text>
  <text class="small" x="961" y="316" text-anchor="middle">static / S3 / DynamoDB</text>

  <rect class="box" x="654" y="258" width="178" height="80" />
  <text class="label" x="743" y="290" text-anchor="middle">Final answer</text>
  <text class="small" x="743" y="316" text-anchor="middle">tool-grounded reply</text>

  <path class="arrow" d="M168 195 H210" />
  <path class="arrow" d="M376 149 H418" />
  <path class="arrow" d="M604 149 H646" />
  <path class="arrow" d="M832 149 H874" />
  <path class="arrow" d="M961 202 V250" />
  <path class="arrow" d="M882 298 H840" />
  <path class="arrow" d="M743 258 C743 224 698 212 654 194" />
  <path class="soft" d="M297 258 V210" />
  <path class="soft" d="M515 258 C590 236 686 218 743 202" />
</svg>
