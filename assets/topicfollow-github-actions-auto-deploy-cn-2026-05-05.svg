<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">TopicFollow GitHub Actions automatic production deploy flow</title>
  <desc id="desc">A non-Mermaid diagram showing how a git push to main becomes a Docker image in ECR, a new ECS task definition revision, an ECS service rolling update, and a live website behind ALB.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#059669"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 36px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 22; }
      .box-blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 22; }
      .box-green { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 22; }
      .box-amber { fill: #fffbeb; stroke: #d97706; stroke-width: 2; rx: 22; }
      .box-red { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 22; }
      .box-dash { fill: #ffffff; stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 7; rx: 22; }
      .label { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .tiny { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .code { font: 600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1e293b; }
      .arrow { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .arrow-green { stroke: #059669; stroke-width: 4; fill: none; marker-end: url(#arrow-green); }
      .note-title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #92400e; }
      .note { font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #78350f; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="980"/>

  <text x="80" y="70" class="title">TopicFollow：git push 后自动部署网站</text>
  <text x="80" y="105" class="subtitle">这条线只部署网站代码；topic 写库和 hero 图片上传仍用单独 ECS helper，避免普通代码提交误写生产数据。</text>

  <rect x="70" y="150" width="260" height="130" class="box"/>
  <text x="100" y="195" class="label">1. 本地 Mac</text>
  <text x="100" y="230" class="code">git commit</text>
  <text x="100" y="258" class="code">git push main</text>

  <rect x="410" y="150" width="290" height="130" class="box-blue"/>
  <text x="440" y="195" class="label">2. GitHub Actions</text>
  <text x="440" y="230" class="small">Deploy production workflow</text>
  <text x="440" y="258" class="tiny">main 分支 push 自动触发</text>

  <rect x="780" y="150" width="300" height="130" class="box-green"/>
  <text x="810" y="195" class="label">3. AWS OIDC Role</text>
  <text x="810" y="230" class="small">临时 assume deploy role</text>
  <text x="810" y="258" class="tiny">不用长期 AWS access key</text>

  <rect x="1160" y="150" width="350" height="130" class="box"/>
  <text x="1190" y="195" class="label">4. CI 检查</text>
  <text x="1190" y="230" class="small">npm ci / lint / Next build</text>
  <text x="1190" y="258" class="tiny">失败就停，不部署 ECS</text>

  <path class="arrow" d="M330 215 H400"/>
  <path class="arrow-green" d="M700 215 H770"/>
  <path class="arrow" d="M1080 215 H1150"/>

  <rect x="170" y="365" width="350" height="150" class="box-blue"/>
  <text x="200" y="410" class="label">5. Docker Buildx + QEMU</text>
  <text x="200" y="445" class="small">读取 ECS 当前 runtime platform</text>
  <text x="200" y="475" class="code">ARM64 -> linux/arm64</text>
  <text x="200" y="500" class="tiny">这一步避免 amd64 镜像跑不进 ARM64 Fargate</text>

  <rect x="625" y="365" width="300" height="150" class="box-green"/>
  <text x="655" y="410" class="label">6. Amazon ECR</text>
  <text x="655" y="445" class="small">保存新的 Docker image</text>
  <text x="655" y="475" class="code">topicfollow-prod:web-&lt;commit&gt;</text>

  <rect x="1030" y="365" width="400" height="150" class="box-amber"/>
  <text x="1060" y="410" class="label">7. 新 Task Definition revision</text>
  <text x="1060" y="445" class="small">复制当前正在跑的 service 定义</text>
  <text x="1060" y="475" class="small">只替换 container image</text>
  <text x="1060" y="500" class="tiny">secrets / roles / CPU / memory / network 保持一致</text>

  <path class="arrow" d="M1335 280 V325 C1335 345 505 345 505 365"/>
  <path class="arrow-green" d="M520 440 H615"/>
  <path class="arrow" d="M925 440 H1020"/>

  <rect x="205" y="615" width="390" height="150" class="box-amber"/>
  <text x="235" y="660" class="label">8. ECS Service rolling update</text>
  <text x="235" y="695" class="small">topicfollow-prod-web-service-sesec3gq</text>
  <text x="235" y="725" class="small">新 task 健康后替换旧 task</text>
  <text x="235" y="750" class="tiny">等待 desired=1 / running=1 / pending=0</text>

  <rect x="705" y="615" width="340" height="150" class="box-blue"/>
  <text x="735" y="660" class="label">9. ALB / Target Group</text>
  <text x="735" y="695" class="small">只把流量转给 healthy task</text>
  <text x="735" y="725" class="small">health check: /api/health</text>

  <rect x="1160" y="615" width="300" height="150" class="box-green"/>
  <text x="1190" y="660" class="label">10. 生产网站</text>
  <text x="1190" y="695" class="small">www.topicfollow.com</text>
  <text x="1190" y="725" class="small">smoke test 通过</text>

  <path class="arrow" d="M1230 515 V565 C1230 590 405 590 405 615"/>
  <path class="arrow" d="M595 690 H695"/>
  <path class="arrow-green" d="M1045 690 H1150"/>

  <rect x="70" y="840" width="1460" height="90" class="box-dash"/>
  <text x="105" y="875" class="note-title">不在这条自动部署线里的事情</text>
  <text x="105" y="905" class="note">Topic ingestion：本地 subagent 产出 aggregation JSON，最后用 ECS one-off write-plan 写 RDS。</text>
  <text x="780" y="905" class="note">Hero image：本地生成图片，ECS helper 上传 S3 并更新 topics.hero_image。</text>
</svg>
