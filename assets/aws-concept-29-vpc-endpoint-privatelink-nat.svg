<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">VPC endpoint PrivateLink NAT comparison</title>
  <desc id="desc">NAT Gateway, Gateway Endpoint, Interface Endpoint, and PrivateLink.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/></marker>
    <style>
      .page{fill:#f6f8fb}.title{font:700 34px Arial,sans-serif;fill:#111827}.subtitle{font:400 18px Arial,sans-serif;fill:#475467}
      .vpc{fill:#fff7ed;stroke:#f97316;stroke-width:3;rx:22}.box{fill:#fff;stroke:#d0d5dd;stroke-width:2;rx:14}.private{fill:#eef4ff;stroke:#175cd3;stroke-width:2.4;rx:14}
      .endpoint{fill:#ecfdf3;stroke:#039855;stroke-width:2.4;rx:14}.internet{fill:#fdf2fa;stroke:#c11574;stroke-width:2.4;rx:14}.service{fill:#f4f3ff;stroke:#7a5af8;stroke-width:2.4;rx:14}
      .label{font:700 21px Arial,sans-serif;fill:#101828}.body{font:400 15.5px Arial,sans-serif;fill:#475467}.tiny{font:400 13.5px Arial,sans-serif;fill:#667085}
      .line{stroke:#344054;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.dash{stroke:#667085;stroke-width:2.2;stroke-dasharray:8 7;fill:none;marker-end:url(#arrow)}
      .note{fill:#fff;stroke:#d0d5dd;stroke-width:1.8;rx:12}.noteText{font:700 16px Arial,sans-serif;fill:#344054}
    </style>
  </defs>
  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 27：VPC Endpoint、PrivateLink、NAT Gateway</text>
  <text class="subtitle" x="52" y="92">私有子网访问 AWS 服务，不一定非得绕公网；VPC Endpoint 可以让流量走 AWS 私有网络路径。</text>
  <rect class="vpc" x="56" y="132" width="720" height="496"/><text class="label" x="90" y="172">VPC</text><text class="body" x="90" y="200">Private subnet 里的应用想访问外部服务</text>
  <rect class="private" x="120" y="268" width="220" height="92"/><text class="label" x="154" y="306">Private App</text><text class="tiny" x="154" y="332">ECS / EC2 / Lambda</text>
  <rect class="internet" x="428" y="190" width="220" height="82"/><text class="label" x="462" y="228">NAT Gateway</text><text class="tiny" x="462" y="254">私有资源主动出公网</text>
  <rect class="endpoint" x="428" y="328" width="220" height="82"/><text class="label" x="462" y="366">Gateway Endpoint</text><text class="tiny" x="462" y="392">常用于 S3 / DynamoDB</text>
  <rect class="endpoint" x="428" y="466" width="220" height="82"/><text class="label" x="462" y="504">Interface Endpoint</text><text class="tiny" x="462" y="530">ENI + PrivateLink</text>
  <path class="dash" d="M340 314 C390 292 402 238 428 230"/><path class="line" d="M340 314 C388 322 400 350 428 368"/><path class="line" d="M340 314 C390 390 402 476 428 506"/>
  <rect class="internet" x="884" y="188" width="236" height="82"/><text class="label" x="918" y="226">Internet</text><text class="tiny" x="918" y="252">公网 SaaS / API</text>
  <rect class="service" x="884" y="326" width="236" height="82"/><text class="label" x="918" y="364">S3 / DynamoDB</text><text class="tiny" x="918" y="390">Gateway endpoint 路径</text>
  <rect class="service" x="884" y="464" width="236" height="82"/><text class="label" x="918" y="502">AWS Services</text><text class="tiny" x="918" y="528">ECR / Logs / Secrets 等</text>
  <path class="dash" d="M648 230 L884 230"/><path class="line" d="M648 370 L884 370"/><path class="line" d="M648 508 L884 508"/>
  <rect class="box" x="884" y="590" width="236" height="62"/><text class="label" x="918" y="628">PrivateLink</text><text class="tiny" x="918" y="648">也可私有暴露自己的服务</text><path class="dash" d="M1002 546 L1002 590"/>
  <rect class="note" x="56" y="684" width="1064" height="44"/><text class="noteText" x="88" y="712">一句话：NAT 是出公网；VPC Endpoint 是私有访问 AWS 服务；PrivateLink 是接口端点背后的私有连接能力。</text>
</svg>
