<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">AWS security services map</title>
  <desc id="desc">A Chinese diagram comparing AWS WAF, Shield, GuardDuty, Inspector, Security Hub, Macie, Detective, and Security Lake.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .page { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475467; }
      .box { fill: #ffffff; stroke: #d0d5dd; stroke-width: 2; rx: 14; }
      .protect { fill: #eef4ff; stroke: #175cd3; stroke-width: 2.5; rx: 16; }
      .detect { fill: #fff7ed; stroke: #f97316; stroke-width: 2.5; rx: 16; }
      .vuln { fill: #ecfdf3; stroke: #039855; stroke-width: 2.5; rx: 16; }
      .hub { fill: #fdf2fa; stroke: #c11574; stroke-width: 2.5; rx: 16; }
      .data { fill: #f4f3ff; stroke: #7a5af8; stroke-width: 2.4; rx: 14; }
      .label { font: 700 21px Arial, sans-serif; fill: #101828; }
      .body { font: 400 15.5px Arial, sans-serif; fill: #475467; }
      .tiny { font: 400 13.5px Arial, sans-serif; fill: #667085; }
      .line { stroke: #344054; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #667085; stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.8; rx: 12; }
      .noteText { font: 700 16px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>
  <rect class="page" width="1280" height="760"/>
  <text class="title" x="52" y="58">图 31：AWS 安全服务分工</text>
  <text class="subtitle" x="52" y="92">安全服务不要按名字背，要按阶段看：入口防护、威胁检测、漏洞扫描、敏感数据、统一视图。</text>

  <rect class="protect" x="72" y="168" width="236" height="110"/>
  <text class="label" x="106" y="208">WAF</text>
  <text class="tiny" x="106" y="234">Web 防火墙</text>
  <text class="tiny" x="106" y="254">拦 SQLi/XSS/bot 规则</text>

  <rect class="protect" x="72" y="330" width="236" height="110"/>
  <text class="label" x="106" y="370">Shield</text>
  <text class="tiny" x="106" y="396">DDoS 防护</text>
  <text class="tiny" x="106" y="416">保护公网入口</text>

  <rect class="detect" x="398" y="168" width="236" height="110"/>
  <text class="label" x="432" y="208">GuardDuty</text>
  <text class="tiny" x="432" y="234">威胁检测</text>
  <text class="tiny" x="432" y="254">可疑 API、网络、账号行为</text>

  <rect class="vuln" x="398" y="330" width="236" height="110"/>
  <text class="label" x="432" y="370">Inspector</text>
  <text class="tiny" x="432" y="396">漏洞扫描</text>
  <text class="tiny" x="432" y="416">EC2/ECR/Lambda CVE</text>

  <rect class="data" x="398" y="492" width="236" height="110"/>
  <text class="label" x="432" y="532">Macie</text>
  <text class="tiny" x="432" y="558">敏感数据发现</text>
  <text class="tiny" x="432" y="578">S3 里是否有 PII</text>

  <rect class="hub" x="746" y="250" width="250" height="132"/>
  <text class="label" x="780" y="290">Security Hub</text>
  <text class="body" x="780" y="320">统一风险视图</text>
  <text class="tiny" x="780" y="350">聚合 findings / 合规标准</text>

  <path class="line" d="M308 224 L398 224"/>
  <path class="line" d="M308 386 L398 386"/>
  <path class="line" d="M634 224 C690 238 716 272 746 304"/>
  <path class="line" d="M634 386 C690 372 716 344 746 326"/>
  <path class="line" d="M634 548 C716 500 746 428 790 382"/>

  <rect class="box" x="1060" y="168" width="164" height="92"/>
  <text class="label" x="1090" y="208">Detective</text>
  <text class="tiny" x="1090" y="234">调查根因</text>

  <rect class="box" x="1060" y="330" width="164" height="92"/>
  <text class="label" x="1090" y="370">Security Lake</text>
  <text class="tiny" x="1090" y="396">安全日志湖</text>

  <path class="dash" d="M996 304 C1040 276 1044 238 1060 216"/>
  <path class="dash" d="M996 344 C1040 362 1044 380 1060 382"/>

  <rect class="note" x="72" y="684" width="1152" height="44"/>
  <text class="noteText" x="104" y="712">一句话：WAF/Shield 先挡，GuardDuty 发现威胁，Inspector 扫漏洞，Macie 找敏感数据，Security Hub 聚合风险。</text>
</svg>
