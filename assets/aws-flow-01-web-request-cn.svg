<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">AWS Web 请求生命周期</title>
  <desc id="desc">一次 Web 请求从 DNS 到入口、网络、安全组、计算、数据和日志的流程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/></marker>
    <style>
      .page{fill:#f8fafc}.title{font:700 36px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0f172a}.sub{font:400 18px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#475569}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}.dns{fill:#eff6ff;stroke:#2563eb;stroke-width:2.3;rx:18}.net{fill:#ecfdf5;stroke:#16a34a;stroke-width:2.3;rx:18}.compute{fill:#fff7ed;stroke:#f97316;stroke-width:2.3;rx:18}.data{fill:#fefce8;stroke:#ca8a04;stroke-width:2.3;rx:18}.obs{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2.3;rx:18}
      .h{font:700 22px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0f172a}.t{font:400 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#475569}.s{font:400 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#64748b}.num{font:700 18px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#2563eb}
      .line{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#64748b;stroke-width:2.3;stroke-dasharray:7 8;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="page" width="1600" height="980"/>
  <text class="title" x="58" y="66">一次 Web 请求在 AWS 里怎么跑</text>
  <text class="sub" x="58" y="102">排查网站访问问题时，按这条链逐层看：DNS、入口、路由、安全组、计算、数据、日志。</text>

  <rect class="dns" x="70" y="180" width="210" height="130"/><text class="num" x="98" y="218">1</text><text class="h" x="126" y="218">DNS</text><text class="t" x="105" y="254">Route 53 / Cloudflare</text><text class="s" x="105" y="282">域名解析到入口</text>
  <rect class="dns" x="355" y="180" width="230" height="130"/><text class="num" x="383" y="218">2</text><text class="h" x="411" y="218">边缘层</text><text class="t" x="390" y="254">CloudFront / CDN</text><text class="s" x="390" y="282">缓存、HTTPS、加速</text>
  <rect class="net" x="660" y="180" width="230" height="130"/><text class="num" x="688" y="218">3</text><text class="h" x="716" y="218">入口服务</text><text class="t" x="695" y="254">ALB / API Gateway</text><text class="s" x="695" y="282">listener、rule、health check</text>
  <rect class="net" x="965" y="180" width="230" height="130"/><text class="num" x="993" y="218">4</text><text class="h" x="1021" y="218">网络门禁</text><text class="t" x="1000" y="254">Route Table + SG</text><text class="s" x="1000" y="282">路由能到，端口放行</text>
  <rect class="compute" x="1270" y="180" width="230" height="130"/><text class="num" x="1298" y="218">5</text><text class="h" x="1326" y="218">应用代码</text><text class="t" x="1305" y="254">ECS / EC2 / Lambda</text><text class="s" x="1305" y="282">真正处理请求</text>

  <path class="line" d="M280 245 H355"/><path class="line" d="M585 245 H660"/><path class="line" d="M890 245 H965"/><path class="line" d="M1195 245 H1270"/>

  <rect class="data" x="955" y="475" width="250" height="145"/><text class="num" x="988" y="515">6</text><text class="h" x="1016" y="515">读写数据</text><text class="t" x="990" y="552">RDS / DynamoDB / S3</text><text class="s" x="990" y="582">数据库、文件、对象</text>
  <rect class="obs" x="1270" y="475" width="230" height="145"/><text class="num" x="1303" y="515">7</text><text class="h" x="1331" y="515">记录运行</text><text class="t" x="1305" y="552">CloudWatch Logs</text><text class="s" x="1305" y="582">错误、延迟、指标</text>
  <path class="line" d="M1385 310 V475"/><path class="line" d="M1270 548 H1205"/>

  <rect class="box" x="85" y="475" width="720" height="145"/>
  <text class="h" x="120" y="520">逐层排查法</text>
  <text class="t" x="120" y="556">域名不对：查 DNS / CDN。入口 5xx：查 ALB target health 或 API Gateway logs。</text>
  <text class="t" x="120" y="586">连接超时：查 route table 和 security group。应用报错：查 CloudWatch 和下游数据库。</text>

  <rect class="box" x="85" y="730" width="1415" height="95"/>
  <text class="h" x="120" y="772">记忆句</text>
  <text class="t" x="120" y="806">用户请求不是“直接到服务器”，而是先过域名和入口，再被网络和安全组过滤，最后才到计算资源并访问数据层。</text>
</svg>
